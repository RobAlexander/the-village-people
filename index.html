    this.state = 'sit'; this.stateMs = 2000 + srand(seed, 22) * 9000;
    this.hopProgress = 0; this.facing = 1;
    this.robGardenId = null;
  }
  get sy() { return worldY(this.ny); }
  update(dt) {
    this.stateMs -= dt;
    if (this.state === 'sit') {
      if (this.stateMs <= 0) {
        // Chance to target a nearby ripe garden
        if (Math.random() < 0.15) {
          const target = kitchenGardens.find(g =>
            g.hasRipeVeg && Math.hypot(g.nx - this.nx, g.ny - this.ny) < 0.15);
          if (target) {
            this.tnx = target.nx; this.tny = target.ny;
            this.startNx = this.nx; this.startNy = this.ny;
            this.hopProgress = 0; this.state = 'hop'; this.stateMs = 400;
            this.robGardenId = target.id;
            if (Math.abs(this.tnx - this.nx) > 0.002) this.facing = this.tnx > this.nx ? 1 : -1;
            return;
          }
        }
        if (Math.random() < 0.25) {
          this.state = 'freeze'; this.stateMs = 1200 + Math.random()*2500;
        } else {
          this.tnx = Math.max(0.02, Math.min(0.98, this.nx + (Math.random()-0.5)*0.18));
          this.tny = Math.max(0.50, Math.min(0.98, this.ny + (Math.random()-0.5)*0.10));
          this.startNx = this.nx; this.startNy = this.ny;
          this.hopProgress = 0; this.state = 'hop'; this.stateMs = 340;
          if (Math.abs(this.tnx-this.nx) > 0.002)
            this.facing = this.tnx > this.nx ? 1 : -1;
        }
      }
    } else if (this.state === 'freeze') {
      if (this.stateMs <= 0) { this.state = 'sit'; this.stateMs = 3000 + Math.random()*8000; }
    } else {
      this.hopProgress = Math.min(1, this.hopProgress + dt / 340);
      this.nx = lerp(this.startNx, this.tnx, this.hopProgress);
      this.ny = lerp(this.startNy, this.tny, this.hopProgress);
      if (this.hopProgress >= 1) {
        if (this.robGardenId !== null) {
          const _rg = kitchenGardens.find(g => g.id === this.robGardenId);
          if (_rg) {
            const stealable = _rg.rows.filter(r => !r.stolen && _rg.grown);
            if (stealable.length > 0)
              stealable[Math.floor(Math.random() * stealable.length)].stolen = true;
          }
          this.robGardenId = null;
        }
        this.state = 'sit'; this.stateMs = 1500 + Math.random()*8000;
      }
    }
  }
  draw() {
    const t = tod(), light = ambientLight(t);
    const s = H / 600 * 0.28;
    const x = this.nx * W, y = this.sy;
    const di = col => dimHex(col, light);
    const bounce = this.state === 'hop' ? -Math.sin(this.hopProgress * Math.PI) * 10 * s : 0;
    const earsUp = this.state !== 'hop';
    ctx.save();
    ctx.translate(x, 0); ctx.scale(this.facing, 1); ctx.translate(-x, 0);
    const bx = x, by = y + bounce;
    // Hind haunch
    ctx.beginPath(); ctx.ellipse(bx-5*s, by-4*s, 8*s, 5*s, 0.1, 0, Math.PI*2);
    ctx.fillStyle = di('#8a7868'); ctx.fill();
    // Body
    ctx.beginPath(); ctx.ellipse(bx+2*s, by-5.5*s, 7*s, 5*s, -0.1, 0, Math.PI*2);
    ctx.fillStyle = di('#8a7868'); ctx.fill();
    // Belly
    ctx.beginPath(); ctx.ellipse(bx+2*s, by-4*s, 4.5*s, 3*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#b0a090'); ctx.fill();
    // Head
    disk(bx+9.5*s, by-9.5*s, 5.5*s, di('#8a7868'));
    // Ears
    const lean = earsUp ? 0 : -3*s;
    poly([[bx+7*s,by-14*s],[bx+7*s+lean,by-29*s],[bx+10*s+lean,by-29*s],[bx+10*s,by-14*s]], di('#7a6858'));
    poly([[bx+8*s,by-14*s],[bx+8*s+lean,by-27*s],[bx+10.5*s+lean,by-27*s],[bx+10.5*s,by-14*s]], di('#d09090'));
    poly([[bx+11*s,by-14*s],[bx+11*s+lean,by-28*s],[bx+14.5*s+lean,by-28*s],[bx+14.5*s,by-14*s]], di('#7a6858'));
    poly([[bx+12*s,by-14*s],[bx+12*s+lean,by-26*s],[bx+14.5*s+lean,by-26*s],[bx+14.5*s,by-14*s]], di('#d09090'));
    // Nose + eye
    disk(bx+14.5*s, by-8.5*s, 1.4*s, di('#d08880'));
    disk(bx+12.5*s, by-11.5*s, 1.5*s, '#180808');
    // White tail
    disk(bx-12*s, by-5*s, 4*s, di('#e0d8d0'));
    // Paws
    ctx.beginPath(); ctx.ellipse(bx-3*s, by, 5*s, 2*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#7a6858'); ctx.fill();
    ctx.beginPath(); ctx.ellipse(bx+4.5*s, by, 3*s, 1.5*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#7a6858'); ctx.fill();
    ctx.restore();
  }
}

// ── GHOST ─────────────────────────────────────────────────────────────────────
class Ghost {
  constructor() {
    this.active = false;
    this.nx = 0.5; this.ny = 0.5;
    this.tnx = 0.5; this.tny = 0.5;
    this.stateMs = 0; this.soundMs = 0;
    this.nightRolled = false;
    this.phase = 0;
  }
  get sy() { return worldY(this.ny); }
  _isDeepNight(t) { return t > 0.78 || t < 0.12; }

  update(dt) {
    const t = tod(), deepNight = this._isDeepNight(t);
    this.phase += dt * 0.0025;

    if (!this.active) {
      if (!deepNight) { this.nightRolled = false; return; }
      if (!this.nightRolled) {
        this.nightRolled = true;
        if (!graveyard || graveyard.crosses.length === 0) return;
        // 4% at 1 grave, linear ramp to 13% at 30 graves
        const chance = Math.min(0.13, 0.04 + (graveyard.crosses.length - 1) * (0.09 / 29));
        if (Math.random() > chance) return;
        const cross = graveyard.crosses[Math.floor(Math.random() * graveyard.crosses.length)];
        this.nx = cross.nx + (Math.random() - 0.5) * 0.04;
        this.ny = cross.ny + (Math.random() - 0.5) * 0.04;
        this._pickTarget();
        this.active = true;
        this.soundMs = 1500 + Math.random() * 3000;
      }
      return;
    }

    if (!deepNight) { this.active = false; return; }

    this.stateMs -= dt;
    if (this.stateMs <= 0) this._pickTarget();
    const dx = this.tnx - this.nx, dy = this.tny - this.ny;
    const dist = Math.hypot(dx, dy);
    if (dist > 0.005) {
      const move = Math.min(dist, 0.000028 * dt); // very slow drift
      this.nx += (dx / dist) * move;
      this.ny += (dy / dist) * move;
    }
    this.soundMs -= dt;
    if (this.soundMs <= 0) { playGhostMoan(); this.soundMs = 10000 + Math.random() * 14000; }
  }

  _pickTarget() {
    const gx = graveyard ? graveyard.nx : 0.5;
    const gy = graveyard ? graveyard.ny : 0.5;
    this.tnx = Math.max(0.05, Math.min(0.95, gx + (Math.random() - 0.5) * 0.45));
    this.tny = Math.max(0.05, Math.min(0.95, gy + (Math.random() - 0.5) * 0.30));
    this.stateMs = 5000 + Math.random() * 10000;
  }

  draw() {
    if (!this.active) return;
    const s = H / 1200;
    const x = this.nx * W;
    const y = this.sy + Math.sin(this.phase) * 5 * s; // gentle vertical bob

    // Outer glow
    const gr = ctx.createRadialGradient(x, y - 18 * s, 0, x, y - 18 * s, 34 * s);
    gr.addColorStop(0, 'rgba(180,255,210,0.18)');
    gr.addColorStop(1, 'rgba(160,255,200,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(x - 34 * s, y - 52 * s, 68 * s, 68 * s);

    ctx.save();
    ctx.globalAlpha = 0.72;
    // Wispy shroud base
    poly([
      [x - 10 * s, y - 4 * s], [x + 10 * s, y - 4 * s],
      [x +  6 * s, y + 7 * s], [x +  2 * s, y + 14 * s],
      [x,          y + 16 * s],
      [x -  2 * s, y + 14 * s], [x -  6 * s, y + 7 * s],
    ], '#d8fff2');
    // Main body
    ctx.beginPath();
    ctx.ellipse(x, y - 18 * s, 11 * s, 18 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#eafff8'; ctx.fill();
    ctx.globalAlpha = 0.88;
    // Hollow eye sockets
    ctx.beginPath(); ctx.ellipse(x - 4.5 * s, y - 21 * s, 3 * s, 3.5 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#081408'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + 4.5 * s, y - 21 * s, 3 * s, 3.5 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#081408'; ctx.fill();
    // Open mouth
    ctx.beginPath(); ctx.ellipse(x, y - 13 * s, 2.5 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#081408'; ctx.fill();
    ctx.restore();
  }
}

// ── ANGEL ─────────────────────────────────────────────────────────────────────
class Angel {
  constructor(nx, ny, seed) {
    this.nx = nx; this.ny = ny;
    this.seed = seed;
    this.tnx = nx; this.tny = ny;
    this.wingT = 0;
  }
  get sy() { return worldY(this.ny); }
  update(dt) {
    this.wingT += dt * 0.003;
    const speed = 0.00014;
    const dx = this.tnx - this.nx, dy = this.tny - this.ny;
    const dist = Math.hypot(dx, dy);
    if (dist > 0.001) {
      const move = Math.min(dist, speed * dt);
      this.nx += (dx / dist) * move;
      this.ny += (dy / dist) * move;
    }
  }
  draw() {
    const t = tod(), light = ambientLight(t);
    const di = col => dimHex(col, light);
    const x = this.nx * W, y = worldY(this.ny);
    const s = H / 1200;
    const white = di('#f0f0ff');
    const cream = di('#fefce8');
    const gold  = di('#e8c030');
    const skin  = di(C.SKIN);
    const wflap = Math.sin(this.wingT * 2.2) * 12 * s;
    // Left wing — swept polygon
    poly([
      [x - 4*s, y - 26*s],
      [x - 30*s, y - 30*s + wflap],
      [x - 22*s, y - 18*s + wflap * 0.4],
      [x - 4*s, y - 16*s],
    ], cream);
    // Right wing — symmetric
    poly([
      [x + 4*s, y - 26*s],
      [x + 30*s, y - 30*s + wflap],
      [x + 22*s, y - 18*s + wflap * 0.4],
      [x + 4*s, y - 16*s],
    ], cream);
    // Robe
    poly([[x-6*s, y-28*s],[x+6*s, y-28*s],[x+9*s, y],[x-9*s, y]], white);
    // Sleeves / arms raised in prayer
    poly([[x-6*s, y-26*s],[x-16*s, y-20*s],[x-14*s, y-17*s],[x-4*s, y-24*s]], white);
    poly([[x+6*s, y-26*s],[x+16*s, y-20*s],[x+14*s, y-17*s],[x+4*s, y-24*s]], white);
    // Head
    disk(x, y - 34*s, 6*s, skin);
    // Halo
    ctx.beginPath();
    ctx.arc(x, y - 42*s, 7*s, 0, Math.PI * 2);
    ctx.strokeStyle = gold; ctx.lineWidth = 2 * s;
    ctx.globalAlpha = 0.9; ctx.stroke(); ctx.globalAlpha = 1;
  }
}

// ── MAUSOLEUM ─────────────────────────────────────────────────────────────────
class Mausoleum {
  constructor(nx, ny, interredCount) {
    this.id = nextId++;
    this.nx = nx; this.ny = ny;
    this.completion = 0; this.buildMs = 0;
    this.interredCount = interredCount;
  }
  get sy() { return worldY(this.ny); }
  get elaborateness() {
    return Math.min(1, Math.max(0, ((graveyard ? graveyard.totalDead : 0) - 100) / 400));
  }
  update(dt) {
    const workers = villagers.filter(v =>
      v.state === 'build_mausoleum' &&
      Math.hypot(v.nx - this.nx, v.ny - this.ny) < 0.08
    ).length;
    this.buildMs += dt * workers;
    this.completion = Math.min(1, this.buildMs / 500000);
  }
  draw() {
    const t = tod(), light = ambientLight(t);
    const di = hex => dimHex(hex, light);
    const c = this.completion;
    if (c <= 0) return;
    const bldA = Math.min(1, c * 4);
    const e = this.elaborateness;
    const ea = (lo, hi) => Math.max(0, Math.min(1, (e - lo) / (hi - lo)));
    const x = this.nx * W;
    const y = this.sy;
    const s = H / 1200;
    // Colors
    const stone  = di('#c8c0ac');
    const stoneD = di('#807060');
    const colS   = di('#d4ceba');
    const iron   = di('#262620');
    const gold   = di('#b88830');
    // Pre-computed vertical positions
    const doorbase    = y - 10 * s;
    const bodyTop     = doorbase - 48 * s;
    const corniceTopY = bodyTop - 7 * s;
    const pedTipY     = corniceTopY - 24 * s;
    const drumTopY    = pedTipY - 7 * s;
    const domeCtrY    = drumTopY - 15 * s;
    const domeTopY    = domeCtrY - 15 * s;
    const twTopY      = domeTopY - 30 * s;
    const tcornY      = twTopY - 4 * s;
    const spTipY      = tcornY - 32 * s;

    ctx.save();
    ctx.globalAlpha = bldA;

    // 3 stone steps (always)
    for (let i = 0; i < 3; i++) {
      const sw = (88 + (3 - i) * 8) * s;
      box(x - sw / 2, y - (3 - i) * 4 * s, sw, 4 * s, i === 0 ? stoneD : stone);
    }

    // Main rectangular body (always)
    const bw = 88 * s, bh = 48 * s;
    box(x - bw / 2, bodyTop, bw, bh, stone);
    box(x - bw / 2, bodyTop, 6 * s, bh, stoneD);
    box(x + bw / 2 - 6 * s, bodyTop, 6 * s, bh, stoneD);

    // Side wings (e > 0.52)
    if (e > 0.52) {
      const wingA = ea(0.52, 0.65);
      ctx.globalAlpha = bldA * wingA;
      const ww = 24 * s, wh = 36 * s;
      const wy = y - wh - 12 * s;
      box(x - bw / 2 - ww, wy, ww, wh, stone);
      box(x + bw / 2,       wy, ww, wh, stone);
      box(x - bw / 2 - ww, wy - 5 * s, ww, 5 * s, stoneD);
      box(x + bw / 2,       wy - 5 * s, ww, 5 * s, stoneD);
      ctx.globalAlpha = bldA;
    }

    // Arched doorway + stone surround (always)
    box(x - 10 * s, doorbase - 26 * s, 20 * s, 28 * s, stoneD);
    ctx.beginPath();
    ctx.arc(x, doorbase - 18 * s, 8 * s, Math.PI, 0);
    ctx.rect(x - 8 * s, doorbase - 18 * s, 16 * s, 18 * s);
    ctx.fillStyle = di('#1a1410'); ctx.fill();

    // Doorway pilasters with fluting (e > 0)
    if (e > 0) {
      const pilA = ea(0, 0.15);
      ctx.globalAlpha = bldA * pilA;
      for (const side of [-1, 1]) {
        const px = x + side * 12 * s;
        box(px - 3 * s, doorbase - 32 * s, 6 * s, 32 * s, colS);
        for (let f = 1; f <= 3; f++) box(px - 3 * s + f * 1.2 * s, doorbase - 30 * s, 0.6 * s, 28 * s, stoneD);
        box(px - 4 * s, doorbase - 33 * s, 8 * s, 3 * s, stoneD);
        box(px - 4 * s, doorbase - 3 * s,  8 * s, 3 * s, stoneD);
      }
      ctx.globalAlpha = bldA;
    }

    // Corner pilasters (e > 0.22)
    if (e > 0.22) {
      const cpA = ea(0.22, 0.38);
      ctx.globalAlpha = bldA * cpA;
      for (const side of [-1, 1]) {
        const px = x + side * (bw / 2 - 5 * s);
        box(px - 4 * s, bodyTop, 8 * s, bh, colS);
        box(px - 5 * s, bodyTop - 3 * s, 10 * s, 3 * s, stoneD);
        box(px - 5 * s, bodyTop + bh,    10 * s, 3 * s, stoneD);
      }
      ctx.globalAlpha = bldA;
    }

    // Cornice band (always)
    box(x - bw / 2 - 4 * s, corniceTopY, bw + 8 * s, 7 * s, stoneD);

    // Triangular pediment (e > 0.32)
    if (e > 0.32) {
      const pedA = ea(0.32, 0.48);
      ctx.globalAlpha = bldA * pedA;
      poly([[x - bw / 2 - 4 * s, corniceTopY], [x + bw / 2 + 4 * s, corniceTopY], [x, pedTipY]], stone);
      ctx.strokeStyle = stoneD; ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo(x - bw / 2 - 4 * s, corniceTopY);
      ctx.lineTo(x, pedTipY);
      ctx.lineTo(x + bw / 2 + 4 * s, corniceTopY);
      ctx.stroke();
      ctx.globalAlpha = bldA;
    }

    // Carved circular relief + cross in pediment (e > 0.44)
    if (e > 0.44) {
      const relA = ea(0.44, 0.58);
      ctx.globalAlpha = bldA * relA;
      const relY = corniceTopY + (pedTipY - corniceTopY) * 0.55;
      disk(x, relY, 8 * s, stoneD);
      disk(x, relY, 6 * s, stone);
      box(x - 1 * s, relY - 4 * s, 2 * s, 8 * s, stoneD);
      box(x - 4 * s, relY - 1 * s, 8 * s, 2 * s, stoneD);
      ctx.globalAlpha = bldA;
    }

    // Drum + dome + ribs (e > 0.46)
    if (e > 0.46) {
      const domA = ea(0.46, 0.60);
      ctx.globalAlpha = bldA * domA;
      const dr = 18 * s;
      box(x - dr, drumTopY, dr * 2, 7 * s, stone);
      ctx.beginPath();
      ctx.arc(x, domeCtrY, 15 * s, Math.PI, 0);
      ctx.fillStyle = stone; ctx.fill();
      ctx.strokeStyle = stoneD; ctx.lineWidth = 0.8 * s;
      for (let a = -60; a <= 60; a += 30) {
        const ra = a * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(x, domeCtrY);
        ctx.lineTo(x + Math.sin(ra) * 15 * s, domeCtrY - Math.cos(ra) * 15 * s);
        ctx.stroke();
      }
      ctx.globalAlpha = bldA;
    }

    // Gold cross/finial on dome (e > 0.62)
    if (e > 0.62) {
      const finA = ea(0.62, 0.74);
      ctx.globalAlpha = bldA * finA;
      box(x - 1 * s, domeTopY - 8 * s, 2 * s, 8 * s, gold);
      box(x - 4 * s, domeTopY - 6 * s, 8 * s, 2 * s, gold);
      ctx.globalAlpha = bldA;
    }

    // Tower + cornice ring (e > 0.70)
    if (e > 0.70) {
      const twA = ea(0.70, 0.82);
      ctx.globalAlpha = bldA * twA;
      const tw = 20 * s;
      box(x - tw / 2, twTopY, tw, domeTopY - twTopY, stone);
      box(x - tw / 2 - 3 * s, tcornY, tw + 6 * s, 4 * s, stoneD);
      ctx.globalAlpha = bldA;
    }

    // Lancet window in tower (e > 0.76)
    if (e > 0.76) {
      const winA = ea(0.76, 0.88);
      ctx.globalAlpha = bldA * winA;
      const winY = twTopY + (tcornY - twTopY) * 0.5;
      box(x - 4 * s, winY - 10 * s, 8 * s, 12 * s, stoneD);
      ctx.beginPath();
      ctx.arc(x, winY - 6 * s, 3.5 * s, Math.PI, 0);
      ctx.rect(x - 3.5 * s, winY - 6 * s, 7 * s, 6 * s);
      ctx.fillStyle = light < 0.35 ? di(C.WIN_LIT) : di(C.WIN_DAY); ctx.fill();
      ctx.globalAlpha = bldA;
    }

    // Grand spire + gold tip (e > 0.84)
    if (e > 0.84) {
      const spA = ea(0.84, 0.96);
      ctx.globalAlpha = bldA * spA;
      poly([[x - 6 * s, tcornY], [x + 6 * s, tcornY], [x, spTipY]], stoneD);
      disk(x, spTipY, 3 * s, gold);
      ctx.globalAlpha = bldA;
    }

    // Iron fence + gate (e > 0.82) — drawn last so it overlaps steps
    if (e > 0.82) {
      const fenceA = ea(0.82, 0.94);
      ctx.globalAlpha = bldA * fenceA;
      const fw = 168 * s, fd = 38 * s, fy = y + 2 * s;
      box(x - fw / 2, fy - fd, fw, 2 * s, iron);
      box(x - fw / 2, fy - 2 * s, fw, 2 * s, iron);
      const nPick = 28;
      for (let i = 0; i < nPick; i++) {
        const px = x - fw / 2 + (i + 0.5) * (fw / nPick);
        if (Math.abs(px - x) < 12 * s) continue;
        box(px - 1.2 * s, fy - fd - 3 * s, 2.4 * s, fd + 3 * s, iron);
        poly([[px - 1.5 * s, fy - fd - 3 * s], [px + 1.5 * s, fy - fd - 3 * s], [px, fy - fd - 8 * s]], iron);
      }
      ctx.globalAlpha = bldA;
    }

    ctx.restore();
  }
}

// ── KITCHEN GARDEN ────────────────────────────────────────────────────────────
const GARDEN_BUILD_MS = 20000;   // 20s villager work to build fence
const GARDEN_GROW_MS  = 1200000; // 20 real minutes to fully grow

class KitchenGarden {
  constructor(houseId, nx, ny) {
    this.id = nextId++;
    this.houseId = houseId;
    this.nx = nx; this.ny = ny;
    this.built = false; this.buildMs = 0;
    this.growMs = 0;
    this.rows = [
      { type: 'carrot',  stolen: false },
      { type: 'cabbage', stolen: false },
      { type: 'turnip',  stolen: false },
    ];
  }
  get sy()        { return worldY(this.ny - 0.068); } // sort at back fence so villagers always draw on top
  get growFrac()  { return Math.min(1, this.growMs / GARDEN_GROW_MS); }
  get grown()     { return this.growMs >= GARDEN_GROW_MS; }
  get hasRipeVeg(){ return this.grown && this.rows.some(r => !r.stolen); }

  update(dt) {
    if (this.built) this.growMs += dt;
  }

  harvest() {
    this.rows.forEach(r => r.stolen = false);
    this.growMs = 0;
  }

  draw() {
    if (!this.built) return;
    const t = tod(), light = ambientLight(t);
    const s = H / 600;
    const di = col => dimHex(col, light);
    const x = this.nx * W, y = this.sy;
    const gw = 22 * s, gh = 26 * s;
    const gf = this.growFrac;

    // Soil rows (3 rows, back to front, evenly spaced)
    const soilCol = di('#5a3a18');
    for (let ri = 0; ri < 3; ri++) {
      const ry = y - gh + (ri + 0.5) * (gh / 3);
      box(x - gw + 2 * s, ry - 2 * s, (gw - 2 * s) * 2, 4 * s, soilCol);
    }

    // Fence
    const fc = di('#deded0');
    // Top rail
    box(x - gw, y - gh - s, gw * 2, 2 * s, fc);
    // Bottom rail with gate gap (10*s opening in centre)
    box(x - gw, y - s, gw - 5 * s, 2 * s, fc);
    box(x + 5 * s, y - s, gw - 5 * s, 2 * s, fc);
    // Left and right rails
    box(x - gw - s, y - gh, 2 * s, gh, fc);
    box(x + gw - s, y - gh, 2 * s, gh, fc);
    // 6 picket posts evenly spaced straddling the top rail
    for (let i = 0; i < 6; i++) {
      const px = x - gw + i * (gw * 2 / 5);
      box(px - s, y - gh - 5 * s, 2 * s, 7 * s, fc);
    }

    // Vegetables (4 per row, scaled by sqrt(growFrac))
    const gs = Math.sqrt(gf);
    for (let ri = 0; ri < 3; ri++) {
      if (this.rows[ri].stolen) continue;
      const ry = y - gh + (ri + 0.5) * (gh / 3);
      const type = this.rows[ri].type;
      for (let ci = 0; ci < 4; ci++) {
        const vx = x - gw + (ci + 0.5) * (gw * 2 / 4);
        if (type === 'carrot') {
          poly([[vx, ry - 8 * gs * s], [vx - 3 * gs * s, ry], [vx + 3 * gs * s, ry]], di('#e87020'));
          if (gs > 0.05) {
            ctx.strokeStyle = di('#508020'); ctx.lineWidth = 1.5 * gs * s;
            ctx.beginPath(); ctx.moveTo(vx, ry - 8 * gs * s); ctx.lineTo(vx - 2 * gs * s, ry - 14 * gs * s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(vx, ry - 8 * gs * s); ctx.lineTo(vx + 2 * gs * s, ry - 14 * gs * s); ctx.stroke();
          }
        } else if (type === 'cabbage') {
          if (gs > 0) {
            ctx.beginPath(); ctx.ellipse(vx, ry - 4 * gs * s, 5 * gs * s, 3.5 * gs * s, 0, 0, Math.PI * 2);
            ctx.fillStyle = di('#70a030'); ctx.fill();
          }
        } else { // turnip
          disk(vx, ry - 4 * gs * s, 4 * gs * s, di('#e8e0c0'));
          cap(vx, ry - 4 * gs * s, 4 * gs * s, di('#8060a0'));
          if (gs > 0.05) {
            ctx.strokeStyle = di('#508020'); ctx.lineWidth = 1.5 * gs * s;
            ctx.beginPath(); ctx.moveTo(vx, ry - 8 * gs * s); ctx.lineTo(vx - 2 * gs * s, ry - 13 * gs * s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(vx, ry - 8 * gs * s); ctx.lineTo(vx + 2 * gs * s, ry - 13 * gs * s); ctx.stroke();
          }
        }
      }
    }
  }
}

// ── RUINS ──
class Ruin {
  constructor(nx, ny, widthScale = 1) {
    this.nx = nx; this.ny = ny; this.widthScale = widthScale;
  }
  get sy() { return worldY(this.ny); }
  draw() {
    const s = H / 600;
    const cx = this.nx * W, cy = worldY(this.ny);
    const hw = 28 * this.widthScale * s;
    const t = ambientLight(tod());
    // Charred rubble — low pile of dark polygons
    ctx.globalAlpha = 1;
    // Base ash layer
    poly([[cx - hw, cy], [cx + hw, cy], [cx + hw*0.8, cy - 6*s], [cx - hw*0.8, cy - 6*s]], dimHex('#2a2520', t));
    // Charred timber chunks
    const seed = this.nx * 1000 | 0;
    for (let i = 0; i < 5; i++) {
      const bx = cx + (srand(seed, i * 3) - 0.5) * hw * 1.4;
      const by = cy - srand(seed, i * 3 + 1) * 8 * s;
      const bw = (4 + srand(seed, i * 3 + 2) * 8) * s;
      box(bx - bw / 2, by - s, bw, 2 * s + 1, dimHex('#1a1208', t));
    }
    // Chimney stump
    box(cx + hw * 0.3, cy - 14 * s, 5 * s, 14 * s, dimHex('#5a4030', t));
    // Ash / soot overlay
    poly([[cx - hw*0.9, cy + 1], [cx + hw*0.9, cy + 1], [cx + hw*0.7, cy - 4*s], [cx - hw*0.7, cy - 4*s]], dimHex('#3a3028', t * 0.6));
  }
}

// ── FARM ANIMALS ──────────────────────────────────────────────────────────────
class Chicken {
  constructor(houseId, nx, ny, seed) {
    this.houseId = houseId;
    this.nx = nx; this.ny = ny;
    this.seed = seed;
    this.tnx = nx; this.tny = ny;
    this.stateMs = 800 + Math.abs(srand(seed, 0)) * 1200;
    this.state = 'peck'; // 'peck' | 'walk'
    this.animT = seed * 3.7;
    this.facing = 1;
  }
  get sy() { return worldY(this.ny); }

  update(dt) {
    const light = ambientLight(tod());
    if (light < 0.25) return; // stay inside at night
    this.animT += dt;
    this.stateMs -= dt;
    if (this.stateMs <= 0) {
      if (this.state === 'peck') {
        // pick a new spot near the house (±0.07 nx, ±0.05 ny)
        const h = houses.find(h => h.id === this.houseId);
        const hx = h ? h.nx : this.nx, hy = h ? h.ny : this.ny;
        this.tnx = Math.max(0.02, Math.min(0.98, hx + (srand(this.seed, this.animT|0) * 0.07)));
        this.tny = Math.max(0.05, Math.min(0.95, hy + (srand(this.seed+1, this.animT|0) * 0.05)));
        this.state = 'walk';
        this.stateMs = 1200 + Math.abs(srand(this.seed+2, this.animT|0)) * 1500;
      } else {
        this.state = 'peck';
        this.stateMs = 700 + Math.abs(srand(this.seed+3, this.animT|0)) * 1000;
      }
    }
    if (this.state === 'walk') {
      const dx = this.tnx - this.nx, dy = this.tny - this.ny;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.003) {
        const speed = 0.000055;
        const move = Math.min(dist, speed * dt);
        this.nx += (dx/dist)*move;
        this.ny += (dy/dist)*move;
        this.facing = dx < 0 ? -1 : 1;
      } else {
        this.state = 'peck';
        this.stateMs = 700 + Math.abs(srand(this.seed+3, this.animT|0)) * 1000;
      }
    }
  }

  draw() {
    const light = ambientLight(tod());
    if (light < 0.25) return;
    const di = c => dimHex(c, light);
    const s = H / 600 * 0.28;
    const x = this.nx * W, y = worldY(this.ny);
    const pecking = this.state === 'peck';
    // Head bob when pecking
    const headBob = pecking ? Math.sin(this.animT * 0.008) * 3 * s : 0;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(this.facing, 1);
    // Body — oval
    ctx.beginPath();
    ctx.ellipse(0, -5*s, 4.5*s, 3.5*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#e8d870'); ctx.fill();
    // Wing highlights
    ctx.beginPath();
    ctx.ellipse(-0.5*s, -5.5*s, 3*s, 2*s, -0.2, 0, Math.PI*2);
    ctx.fillStyle = di('#d4c440'); ctx.fill();
    // Tail feathers
    poly([[3*s, -5*s],[5.5*s, -8*s],[4.5*s, -4*s],[3.5*s, -3*s]], di('#c8b830'));
    // Neck
    poly([[-1.5*s, -7.5*s],[1*s, -7.5*s],[1.5*s, -10*s + headBob],[-1*s, -10*s + headBob]], di('#e8d870'));
    // Head
    disk(0, -11*s + headBob, 2.8*s, di('#e8d870'));
    // Comb
    poly([[0, -13.5*s + headBob],[-1.2*s, -14.5*s + headBob],[0.3*s, -15*s + headBob],[1.2*s, -14*s + headBob]], di('#d03030'));
    // Beak
    poly([[1.5*s, -11.2*s + headBob],[3.5*s, -10.8*s + headBob],[2*s, -10*s + headBob]], di('#e8a020'));
    // Eye
    disk(0.8*s, -11.8*s + headBob, 0.8*s, di('#202020'));
    // Legs
    const legSwing = this.state === 'walk' ? Math.sin(this.animT * 0.012) * 2 * s : 0;
    ctx.strokeStyle = di('#e8a020'); ctx.lineWidth = 1.2*s;
    ctx.beginPath(); ctx.moveTo(-1.5*s, -2.5*s); ctx.lineTo(-1.5*s + legSwing, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1*s, -2.5*s); ctx.lineTo(1*s - legSwing, 0); ctx.stroke();
    ctx.restore();
  }
}

class Pig {
  constructor(houseId, nx, ny, seed) {
    this.houseId = houseId;
    this.nx = nx; this.ny = ny;
    this.seed = seed;
    this.tnx = nx; this.tny = ny;
    this.stateMs = 2000 + Math.abs(srand(seed, 0)) * 2000;
    this.state = 'root'; // 'root' | 'walk'
    this.animT = seed * 2.1;
    this.facing = 1;
  }
  get sy() { return worldY(this.ny); }

  update(dt) {
    const light = ambientLight(tod());
    if (light < 0.25) return;
    this.animT += dt;
    this.stateMs -= dt;
    if (this.stateMs <= 0) {
      if (this.state === 'root') {
        const h = houses.find(h => h.id === this.houseId);
        const hx = h ? h.nx : this.nx, hy = h ? h.ny : this.ny;
        this.tnx = Math.max(0.02, Math.min(0.98, hx + srand(this.seed, this.animT|0) * 0.09));
        this.tny = Math.max(0.05, Math.min(0.95, hy + srand(this.seed+1, this.animT|0) * 0.06));
        this.state = 'walk';
        this.stateMs = 2500 + Math.abs(srand(this.seed+2, this.animT|0)) * 2000;
      } else {
        this.state = 'root';
        this.stateMs = 1500 + Math.abs(srand(this.seed+3, this.animT|0)) * 2000;
      }
    }
    if (this.state === 'walk') {
      const dx = this.tnx - this.nx, dy = this.tny - this.ny;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.004) {
        const speed = 0.000030;
        const move = Math.min(dist, speed * dt);
        this.nx += (dx/dist)*move;
        this.ny += (dy/dist)*move;
        this.facing = dx < 0 ? -1 : 1;
      } else {
        this.state = 'root';
        this.stateMs = 1500 + Math.abs(srand(this.seed+3, this.animT|0)) * 2000;
      }
    }
  }

  draw() {
    const light = ambientLight(tod());
    if (light < 0.25) return;
    const di = c => dimHex(c, light);
    const s = H / 600 * 0.38;
    const x = this.nx * W, y = worldY(this.ny);
    const walking = this.state === 'walk';
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(this.facing, 1);
    const pink = di('#f0a0b0');
    const dpink = di('#d07888');
    // Body
    ctx.beginPath();
    ctx.ellipse(0, -4*s, 7*s, 4.5*s, 0, 0, Math.PI*2);
    ctx.fillStyle = pink; ctx.fill();
    // Head
    disk(-6*s, -5*s, 4*s, pink);
    // Snout
    disk(-9.5*s, -4.5*s, 2.5*s, dpink);
    // Nostrils
    disk(-10.2*s, -4.2*s, 0.6*s, di('#b05060'));
    disk(-9*s,   -4.2*s, 0.6*s, di('#b05060'));
    // Eye
    disk(-5.5*s, -6.5*s, 0.8*s, di('#303030'));
    // Ear
    poly([[-4.5*s,-8.5*s],[-6.5*s,-10*s],[-3*s,-9.5*s]], dpink);
    // Curly tail
    ctx.strokeStyle = dpink; ctx.lineWidth = 1.5*s; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(7*s, -5*s, 2*s, 0.3, Math.PI * 1.8);
    ctx.stroke();
    // Legs with waddle
    const legSwing = walking ? Math.sin(this.animT * 0.009) * 1.5 * s : 0;
    ctx.strokeStyle = pink; ctx.lineWidth = 2.5*s; ctx.lineCap = 'round';
    [[-4*s, 0],[4*s, 0]].forEach(([lx], i) => {
      const swing = i % 2 === 0 ? legSwing : -legSwing;
      ctx.beginPath(); ctx.moveTo(lx, -1*s); ctx.lineTo(lx + swing, 2*s); ctx.stroke();
    });
    ctx.restore();
  }
}

class Dog {
  constructor(houseId, nx, ny, seed) {
    this.houseId = houseId;
    this.nx = nx; this.ny = ny;
    this.seed = seed;
    this.tnx = nx; this.tny = ny;
    this.stateMs = 1500 + Math.abs(srand(seed, 0)) * 2000;
    this.state = 'sit'; // 'sit' | 'walk' | 'doorstep'
    this.animT = seed * 1.9;
    this.facing = 1;
    // Seeded coat: golden or brown
    this.coat = Math.abs(srand(seed, 99)) > 0.5 ? '#c88030' : '#7a4820';
  }
  get sy() { return worldY(this.ny); }

  update(dt) {
    const light = ambientLight(tod());
    if (light < 0.25) return;
    this.animT += dt;
    this.stateMs -= dt;
    if (this.stateMs <= 0) {
      const h = houses.find(h => h.id === this.houseId);
      // Occasionally trot to doorstep
      const r = Math.abs(srand(this.seed+5, this.animT|0));
      if (h && r > 0.8 && this.state !== 'doorstep') {
        this.tnx = h.nx; this.tny = bldgDoorNy(h.ny);
        this.state = 'doorstep';
        this.stateMs = 3000 + r * 3000;
      } else if (this.state === 'sit' || this.state === 'doorstep') {
        const hx = h ? h.nx : this.nx, hy = h ? h.ny : this.ny;
        this.tnx = Math.max(0.02, Math.min(0.98, hx + srand(this.seed, this.animT|0) * 0.10));
        this.tny = Math.max(0.05, Math.min(0.95, hy + srand(this.seed+1, this.animT|0) * 0.07));
        this.state = 'walk';
        this.stateMs = 1800 + Math.abs(srand(this.seed+2, this.animT|0)) * 2000;
      } else {
        this.state = 'sit';
        this.stateMs = 1200 + Math.abs(srand(this.seed+3, this.animT|0)) * 1500;
      }
    }
    if (this.state === 'walk' || this.state === 'doorstep') {
      const dx = this.tnx - this.nx, dy = this.tny - this.ny;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.004) {
        const speed = 0.000080;
        const move = Math.min(dist, speed * dt);
        this.nx += (dx/dist)*move;
        this.ny += (dy/dist)*move;
        this.facing = dx < 0 ? -1 : 1;
      } else {
        this.state = 'sit';
        this.stateMs = 1200 + Math.abs(srand(this.seed+3, this.animT|0)) * 1500;
      }
    }
  }

  draw() {
    const light = ambientLight(tod());
    if (light < 0.25) return;
    const di = c => dimHex(c, light);
    const s = H / 600 * 0.35;
    const x = this.nx * W, y = worldY(this.ny);
    const walking = this.state === 'walk' || this.state === 'doorstep';
    const coat = di(this.coat);
    const dark = di(this.coat === '#c88030' ? '#8a4c10' : '#3a1c08');
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(this.facing, 1);
    // Body
    ctx.beginPath();
    ctx.ellipse(0, -5*s, 6*s, 4*s, 0, 0, Math.PI*2);
    ctx.fillStyle = coat; ctx.fill();
    // Head
    disk(-5.5*s, -8*s, 3.5*s, coat);
    // Muzzle
    ctx.beginPath();
    ctx.ellipse(-7.5*s, -7*s, 2.5*s, 1.8*s, 0.3, 0, Math.PI*2);
    ctx.fillStyle = di(this.coat === '#c88030' ? '#e8b060' : '#5a3018'); ctx.fill();
    // Nose
    disk(-9*s, -7*s, 0.9*s, di('#202020'));
    // Eye
    disk(-4.5*s, -9*s, 0.8*s, di('#202020'));
    // Ear — floppy
    poly([[-3.5*s,-10.5*s],[-2*s,-7*s],[-5.5*s,-6.5*s]], dark);
    // Tail — wagging
    const wag = Math.sin(this.animT * (walking ? 0.016 : 0.010)) * 3 * s;
    poly([[6*s,-7*s],[9*s,-10*s + wag],[8*s,-6.5*s]], coat);
    // Legs
    const legSwing = walking ? Math.sin(this.animT * 0.013) * 2 * s : 0;
    ctx.strokeStyle = coat; ctx.lineWidth = 2.2*s; ctx.lineCap = 'round';
    [[-3.5*s],[2.5*s]].forEach(([lx], i) => {
      const swing = i % 2 === 0 ? legSwing : -legSwing;
      ctx.beginPath(); ctx.moveTo(lx, -2*s); ctx.lineTo(lx + swing, 1.5*s); ctx.stroke();
    });
    ctx.restore();
  }
}

function spawnAnimalsForHouse(h) {
  const seed = h.id * 37;
  const baseNx = h.nx, baseNy = h.ny + 0.04;
  // 3 chickens
  for (let i = 0; i < 3; i++) {
    const cx = baseNx + (srand(seed + i*7, 0) * 0.06);
    const cy = baseNy + (srand(seed + i*7, 1) * 0.04);
    farmAnimals.push(new Chicken(h.id, cx, cy, seed + i*7));
  }
  // 2 pigs
  for (let i = 0; i < 2; i++) {
    const cx = baseNx + (srand(seed + 100 + i*11, 0) * 0.06);
    const cy = baseNy + (srand(seed + 100 + i*11, 1) * 0.04);
    farmAnimals.push(new Pig(h.id, cx, cy, seed + 100 + i*11));
  }
  // 1 dog
  farmAnimals.push(new Dog(h.id, baseNx + srand(seed+200, 0)*0.05, baseNy + srand(seed+200, 1)*0.04, seed+200));
  h.animalsGiven = true;
}

function checkFarmAnimals() {
  for (const h of houses) {
    if (h.animalsGiven) continue;
    if (h.completion < 1) continue;
    // Need 3+ adult/old residents
    const residents = villagers.filter(v => v.homeId === h.id && (v.age === 'adult' || v.age === 'old'));
    if (residents.length < 3) continue;
    // Need a built kitchen garden for this house
    const hasGarden = kitchenGardens.some(g => g.houseId === h.id && g.built);
    if (!hasGarden) continue;
    spawnAnimalsForHouse(h);
  }
}

// ── POND & DUCKS ──────────────────────────────────────────────────────────────
function pickPondPos() {
  // Grid search for a spot clear of buildings and edges.
  let best = null, bestScore = -Infinity;
  for (let nx = 0.10; nx <= 0.88; nx += 0.04) {
    for (let ny = 0.22; ny <= 0.78; ny += 0.04) {
      const minHouse  = houses.reduce((m, h) => Math.min(m, Math.hypot(h.nx-nx, h.ny-ny)), Infinity);
      const minChurch = church ? Math.hypot(church.nx-nx, church.ny-ny) : Infinity;
      const minMaus   = mausoleum ? Math.hypot(mausoleum.nx-nx, mausoleum.ny-ny) : Infinity;
      const minDist   = Math.min(minHouse, minChurch, minMaus);
      if (minDist < 0.18) continue;
      // Prefer central-ish ny (not too far back or front) with some randomness
      const score = minDist + (Math.random() * 0.08);
      if (score > bestScore) { bestScore = score; best = { nx, ny }; }
    }
  }
  return best || { nx: 0.25, ny: 0.50 };
}

function spawnPond() {
  const pos = pickPondPos();
  pond = { nx: pos.nx, ny: pos.ny, rx: 0.068, ry: 0.028 };
  ducks = [];
  for (let i = 0; i < 4; i++) ducks.push(new Duck(i));
}

function checkPond() {
  if (pond) return;
  if (kitchenGardens.filter(g => g.built).length >= 5) spawnPond();
}

class Duck {
  constructor(seed) {
    this.seed   = seed;
    this.isMale = seed % 2 === 0;
    // Start at a random spot inside the pond.
    this.nx     = pond.nx + srand(seed, 10) * pond.rx * 0.75;
    this.ny     = pond.ny + srand(seed, 11) * pond.ry * 0.75;
    this.tnx    = this.nx;
    this.tny    = this.ny;
    this.state  = 'swim'; // 'swim' | 'preen' | 'waddle'
    this.stateMs = 2000 + Math.abs(srand(seed, 12)) * 4000;
    this.facing = srand(seed, 13) > 0 ? 1 : -1;
    this.animT  = seed * 3.1;
  }
  get sy() { return worldY(this.ny); }

  update(dt) {
    this.animT  += dt;
    this.stateMs -= dt;
    if (this.stateMs <= 0) this._pickState();
    const dx = this.tnx - this.nx, dy = this.tny - this.ny;
    const dist = Math.hypot(dx, dy);
    const speed = this.state === 'waddle' ? 0.000045 : 0.000018;
    if (dist > 0.003 && this.state !== 'preen') {
      const move = Math.min(dist, speed * dt);
      this.nx += (dx / dist) * move;
      this.ny += (dy / dist) * move;
      this.facing = dx < 0 ? -1 : 1;
    }
  }

  _pickState() {
    const r = Math.abs(srand(this.seed, this.animT | 0));
    if (r < 0.60) {
      // Swim to a new spot inside the pond.
      this.state = 'swim';
      this.tnx   = pond.nx + srand(this.seed + 1, this.animT | 0) * pond.rx * 0.80;
      this.tny   = pond.ny + srand(this.seed + 2, this.animT | 0) * pond.ry * 0.80;
      this.stateMs = 3000 + Math.abs(srand(this.seed, this.animT + 1 | 0)) * 5000;
    } else if (r < 0.82) {
      // Preen on the bank — just outside the pond edge.
      this.state = 'preen';
      const ang  = srand(this.seed + 3, this.animT | 0) * Math.PI;
      this.tnx   = pond.nx + Math.cos(ang) * (pond.rx + 0.012 + Math.abs(srand(this.seed + 4, this.animT | 0)) * 0.02);
      this.tny   = pond.ny + Math.sin(ang) * (pond.ry + 0.010 + Math.abs(srand(this.seed + 5, this.animT | 0)) * 0.015);
      this.stateMs = 2500 + Math.abs(srand(this.seed + 6, this.animT | 0)) * 3500;
    } else {
      // Short waddle near the bank.
      this.state = 'waddle';
      this.tnx   = pond.nx + srand(this.seed + 7, this.animT | 0) * (pond.rx + 0.035);
      this.tny   = pond.ny + srand(this.seed + 8, this.animT | 0) * (pond.ry + 0.030);
      this.stateMs = 2000 + Math.abs(srand(this.seed + 9, this.animT | 0)) * 3000;
    }
    // Clamp waddle/preen targets to ground bounds.
    this.tnx = Math.max(0.03, Math.min(0.97, this.tnx));
    this.tny = Math.max(0.05, Math.min(0.95, this.tny));
  }

  draw() {
    const light = ambientLight(tod());
    const di = c => dimHex(c, light);
    const s  = H / 600 * 0.24;
    const x  = this.nx * W, y = worldY(this.ny);
    const onWater = this.state === 'swim' || this.state === 'preen';
    // Body sits lower in the water when swimming.
    const bodyY = onWater ? -2.5 * s : -5 * s;
    const bob   = Math.sin(this.animT * 0.0028) * 1.0 * s;
    const bodyCol = di(this.isMale ? '#f0ece0' : '#c8a060');
    const headCol = di(this.isMale ? '#1a5828' : '#a07840');
    const billCol = di('#e09018');

    ctx.save();
    ctx.translate(x, y + bob);
    ctx.scale(this.facing, 1);

    // Body
    ctx.beginPath();
    ctx.ellipse(0, bodyY, 5.5 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = bodyCol; ctx.fill();

    // Tail — upswept triangle at the rear.
    poly([[3.5*s, bodyY-1*s], [6.5*s, bodyY-5*s], [5*s, bodyY+1.5*s]], di(this.isMale ? '#d8d4c8' : '#a88048'));

    // Neck
    poly([[-2*s, bodyY-2*s], [0*s, bodyY-2*s], [0*s, bodyY-5*s], [-2.5*s, bodyY-4.5*s]], bodyCol);

    // Head
    disk(-1.5 * s, bodyY - 6 * s, 2.8 * s, headCol);

    // Bill — flat orange wedge.
    poly([[-3*s, bodyY-5.8*s], [-6*s, bodyY-5.4*s], [-5*s, bodyY-4.5*s], [-2.5*s, bodyY-4.8*s]], billCol);

    // Eye
    disk(-1*s, bodyY - 7 * s, 0.7 * s, di('#101010'));
    // White eye-ring for male
    if (this.isMale) disk(-1*s, bodyY - 7 * s, 1.1 * s, di('#e0e8d0'));

    // Feet (only when on bank).
    if (!onWater) {
      const legSwing = this.state === 'waddle' ? Math.sin(this.animT * 0.011) * 1.5 * s : 0;
      ctx.strokeStyle = billCol; ctx.lineWidth = 1.3 * s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-1*s, bodyY + 3*s); ctx.lineTo(-1*s + legSwing, bodyY + 5*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1.5*s, bodyY + 3*s); ctx.lineTo(1.5*s - legSwing, bodyY + 5*s); ctx.stroke();
    }

    // Ripple ring when swimming.
    if (this.state === 'swim') {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = di('#70a8c8'); ctx.lineWidth = 1 * s;
      ctx.beginPath();
      ctx.ellipse(0, bodyY + 3 * s, 7 * s, 2.2 * s, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }
}

function drawPond() {
  const light = ambientLight(tod());
  const di = c => dimHex(c, light);
  const x  = pond.nx * W;
  const y  = worldY(pond.ny);
  const rx = pond.rx * W;
  const ry = pond.ry * H * (1 - GROUND_TOP);

  // Outer dark rim
  ctx.beginPath();
  ctx.ellipse(x, y, rx + 3, ry + 2.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = di('#2a5060'); ctx.fill();

  // Main water body
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = di('#4880a8'); ctx.fill();

  // Lighter shimmer patch (off-centre)
  ctx.beginPath();
  ctx.ellipse(x - rx * 0.15, y - ry * 0.25, rx * 0.55, ry * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = di('#6898c0'); ctx.fill();

  // Reeds — a few thin dark spikes along the back edge
  const reedCol = di('#3a5828');
  for (let i = 0; i < 5; i++) {
    const rx2 = rx * (0.3 + i * 0.15);
    const ry2 = -ry * (0.85 + (i % 2) * 0.08);
    const h   = ry * (0.55 + (i % 3) * 0.20);
    ctx.strokeStyle = reedCol; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(x + rx2, y + ry2); ctx.lineTo(x + rx2, y + ry2 - h); ctx.stroke();
    // Small oval reed-head
    disk(x + rx2, y + ry2 - h, 2.2, di('#5a7038'));
  }
}

// ── SOUND ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
let soundEnabled = true;
function playChurchBell() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ring = offset => {
      const now = audioCtx.currentTime + offset;
      // Bell partials: fundamental + tierce (min 3rd) + quint (5th) + octave
      [[1.0, 0.022],[1.19, 0.012],[1.50, 0.014],[2.0, 0.016],[3.0, 0.007]].forEach(([ratio, pk]) => {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.value = 280 * ratio;
        gain.gain.setValueAtTime(pk, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.8);
        osc.start(now); osc.stop(now + 4.0);
      });
    };
    ring(0); ring(1.4); ring(2.8);
  } catch(_) {}
}

function playGrow() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime+0.25);
    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.55);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.55);
  } catch(_) {}
}

function playWolfGuitar() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const base = [82.4, 110, 146.8][Math.floor(Math.random() * 3)]; // E2 / A2 / D3
    [1, 2, 3, 4].forEach(h => {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = base * h;
      gain.gain.setValueAtTime(0.030 / h, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.4 / Math.sqrt(h));
      osc.start(now); osc.stop(now + 2.0);
    });
  } catch (_) {}
}

function playGhostMoan() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // Two slightly detuned sines with LFO vibrato; pitch descends then rises (wooOOOooo)
    [0, 4].forEach(detune => {
      const osc  = audioCtx.createOscillator();
      const lfo  = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      const gain = audioCtx.createGain();
      lfo.frequency.value = 2.4;
      lfoG.gain.value = 14;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(190 + detune, now);
      osc.frequency.linearRampToValueAtTime(95 + detune, now + 2.0);
      osc.frequency.linearRampToValueAtTime(130 + detune, now + 3.4);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.022, now + 0.8);
      gain.gain.setValueAtTime(0.022, now + 2.4);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 4.0);
      osc.connect(gain); gain.connect(audioCtx.destination);
      lfo.start(now); lfo.stop(now + 4.0);
      osc.start(now); osc.stop(now + 4.0);
    });
  } catch (_) {}
}

function playHeavenlyChorus() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // C major + 9th chord: C4 E4 G4 C5 E5
    [261.6, 329.6, 392.0, 523.3, 659.3].forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lfo  = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      lfo.frequency.setValueAtTime(4.8, now);
      lfoG.gain.setValueAtTime(1.2, now);
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + 5.5);
      const vol = 0.038 / (1 + i * 0.25);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + 1.0);
      gain.gain.setValueAtTime(vol, now + 3.5);
      gain.gain.linearRampToValueAtTime(0, now + 5.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 5.5);
    });
  } catch(e) {}
}
