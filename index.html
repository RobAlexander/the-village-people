<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
#panel {
  display: none; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(8,8,16,0.82); color: #cfc8a0;
  font: 13px/2 monospace; padding: 22px 30px;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
  min-width: 230px; z-index: 10; user-select: none;
  backdrop-filter: blur(4px);
}
#panel h2 { font-size: 11px; letter-spacing: 3px; margin-bottom: 10px;
  opacity: 0.5; text-transform: uppercase; }
#panel .row { display: flex; justify-content: space-between; gap: 24px; }
#panel hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }
#panel button {
  background: rgba(255,255,255,0.08); color: #cfc8a0;
  border: 1px solid rgba(255,255,255,0.2); padding: 4px 14px;
  cursor: pointer; font: 12px monospace; border-radius: 2px; margin-top: 4px;
}
#panel button:hover { background: rgba(255,255,255,0.18); }
#panel .hint { font-size: 10px; opacity: 0.35; margin-top: 10px; }
#esc-hint {
  position: fixed; bottom: 12px; right: 14px;
  color: rgba(255,255,255,0.22); font: 11px monospace; pointer-events: none;
}
#devcon {
  display: none; position: fixed; top: 10px; left: 10px;
  background: rgba(0,12,4,0.88); color: #80ff80;
  font: 12px/1.6 monospace; padding: 14px 18px;
  border: 1px solid rgba(0,255,80,0.25); border-radius: 3px;
  min-width: 340px; max-width: 420px; z-index: 20;
  backdrop-filter: blur(3px);
}
#devcon h2 { font-size: 10px; letter-spacing: 3px; opacity: 0.5;
  text-transform: uppercase; margin-bottom: 8px; }
#devcon #dcstats { font-size: 11px; white-space: pre; }
#devcon #dcinput {
  margin-top: 10px; width: 100%; box-sizing: border-box;
  background: rgba(0,255,80,0.07); border: 1px solid rgba(0,255,80,0.3);
  color: #80ff80; font: 12px monospace; padding: 4px 8px; outline: none;
  border-radius: 2px;
}
#devcon #dclog { font-size: 11px; opacity: 0.7; min-height: 16px; margin-top: 4px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h2>Village</h2>
  <div id="pstats"></div>
  <hr>
  <div><button id="sndBtn">Sound: ON</button></div>
  <div><button id="resetBtn">Reset simulation</button></div>
  <div id="resetConfirm" style="display:none; margin-top:8px; font-size:11px; color:#e09060;">
    Are you sure? This cannot be undone.<br>
    <button id="resetYes" style="margin-top:6px; color:#e09060; border-color:rgba(224,144,96,0.4);">Yes, reset</button>
    <button id="resetNo"  style="margin-top:6px; margin-left:6px;">Cancel</button>
  </div>
  <div class="hint">Esc to close</div>
</div>
<div id="devcon">
  <h2>Dev Console</h2>
  <div id="dcstats"></div>
  <input id="dcinput" type="text" placeholder="command…" autocomplete="off" spellcheck="false">
  <div id="dclog"></div>
</div>
<div id="esc-hint">Esc — menu</div>
<script>
(function () {
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────────────────
const DAY_MS      = 120000;  // 2 minutes per full day cycle
const GROUND_TOP  = 0.33;    // sky = top 33%; walkable ground = bottom 67%
const CHURCH_POP  = 10;
const FIRST_BATCH = 4;

// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// World-space helpers.
// nx ∈ [0,1] = horizontal, ny ∈ [0,1] = depth (0=far/top, 1=near/bottom).
function skyH()      { return GROUND_TOP * H; }
function gndH()      { return H - skyH(); }
function worldY(ny)  { return skyH() + ny * gndH(); }

// ── COLORS ───────────────────────────────────────────────────────────────────
const C = {
  SKY_NIGHT: ['#060614', '#0d1230'],
  SKY_DAWN:  ['#d4603a', '#f0a050'],
  SKY_DAY:   ['#2878c8', '#76bce8'],
  SKY_DUSK:  ['#b83820', '#e06030'],
  GND_NIGHT: '#141a08',
  GND_DAWN:  '#2e4418',
  GND_DAY:   '#4a7828',
  GND_DUSK:  '#263810',
  SUN:    '#ffe850',
  MOON:   '#dce8f0',
  STAR:   '#ffffff',
  GRASS_L: '#5a8830', GRASS_D: '#2a4810',
  TREE_TRUNK: '#4a2e10', TREE_MID: '#2a5010', TREE_LIGHT: '#3a6818',
  WALL:    '#cca878', WALL_D:  '#906040',
  ROOF:    '#7a2818', DOOR:    '#4a2808',
  WIN_DAY: '#b8d0e8', WIN_LIT: '#f0d870',
  CHIMNEY: '#706050',
  CH_WALL: '#d8d0b8', CH_ROOF: '#484870', CROSS: '#b89840',
  SKIN:    '#e8b878',
  HAIR_BR: '#4a2810', HAIR_BL: '#c89020', HAIR_GR: '#888888',
  SHIRT_M: '#2848a0', SHIRT_F: '#a02848', SHIRT_K: '#38a048',
  PANTS:   '#383838', SKIRT:   '#b03060',
  ROBE:    '#181818', COLLAR:  '#e8e8e8',
  BIRD:    '#303030',
  DRAGON:  '#283818', DRAGON_W: '#344820',
  WIZ_ROBE:  '#1a0a3a', WIZ_HAT: '#2a0a5a', WIZ_HATD: '#160828',
  WIZ_BEARD: '#d8d8d0', WIZ_STAFF: '#5a3a18', WIZ_ORB: '#80c0ff',
};

// ── DRAW HELPERS ─────────────────────────────────────────────────────────────
function poly(pts, fill) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
}
function box(x, y, w, h, fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
function disk(x, y, r, fill)   { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = fill; ctx.fill(); }
function cap(x, y, r, fill)    { ctx.beginPath(); ctx.arc(x, y, r, Math.PI, 0); ctx.fillStyle = fill; ctx.fill(); }

// ── NOISE HELPERS (stable seeded perturbation — no per-frame flicker) ────────
function hash(n) {
  n = (Math.imul((n>>16)^n, 0x45d9f3b)|0);
  n = (Math.imul((n>>16)^n, 0x45d9f3b)|0);
  return ((n>>16)^n & 0x7fffffff) / 0x7fffffff;
}
function srand(seed, i) { return hash(seed * 1009 + i); }
function noisyPoly(pts, seed, amp, fill) {
  const n = pts.map((p, i) => [
    p[0] + (srand(seed, i*2)   - 0.5) * 2 * amp,
    p[1] + (srand(seed, i*2+1) - 0.5) * 2 * amp,
  ]);
  poly(n, fill);
}
function noisyBox(x, y, w, h, seed, amp, fill) {
  const pts = [
    [x,     y    ], [x+w/2, y    ], [x+w,   y    ],
    [x+w,   y+h/2], [x+w,   y+h  ],
    [x+w/2, y+h  ], [x,     y+h  ],
    [x,     y+h/2],
  ];
  noisyPoly(pts, seed, amp, fill);
}

// ── COLOR UTILITIES ──────────────────────────────────────────────────────────
function hexRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lerp(a, b, t)    { return a + (b-a)*t; }
function lerpHex(a, b, t) {
  const [ar,ag,ab] = hexRgb(a), [br,bg,bb] = hexRgb(b);
  return `rgb(${lerp(ar,br,t)|0},${lerp(ag,bg,t)|0},${lerp(ab,bb,t)|0})`;
}
function dimHex(hex, f) {
  if (f >= 1) return hex;
  const [r,g,b] = hexRgb(hex), d = 0.12 + f*0.88;
  return `rgb(${r*d|0},${g*d|0},${b*d|0})`;
}

// ── TIME SYSTEM ──────────────────────────────────────────────────────────────
let gameTime = 0;
function tod()    { return (gameTime % DAY_MS) / DAY_MS; }
function dayNum() { return Math.floor(gameTime / DAY_MS); }

function ambientLight(t) {
  const ph = [0.08, 0.55, 1.0, 0.55];
  const i = (t*4)|0, n = (i+1)%4, f = (t*4)%1;
  return lerp(ph[i], ph[n], f);
}
function skyColors(t) {
  const ph = [C.SKY_NIGHT, C.SKY_DAWN, C.SKY_DAY, C.SKY_DUSK];
  const i = (t*4)|0, n = (i+1)%4, f = (t*4)%1;
  return [lerpHex(ph[i][0], ph[n][0], f), lerpHex(ph[i][1], ph[n][1], f)];
}
function groundColor(t) {
  const ph = [C.GND_NIGHT, C.GND_DAWN, C.GND_DAY, C.GND_DUSK];
  const i = (t*4)|0, n = (i+1)%4, f = (t*4)%1;
  return lerpHex(ph[i], ph[n], f);
}

// ── STARS ────────────────────────────────────────────────────────────────────
const STARS = Array.from({length:90}, () => ({
  x: Math.random(), fy: Math.random()*0.94,
  r: Math.random()*1.3+0.3, phase: Math.random()*Math.PI*2,
}));
function drawStars(light) {
  if (light > 0.55) return;
  const alpha = Math.max(0, 1 - light*1.8), sh = skyH();
  STARS.forEach(s => {
    ctx.globalAlpha = alpha * (0.6 + 0.4*Math.sin(s.phase + gameTime*0.002));
    disk(s.x*W, s.fy*sh, s.r, C.STAR);
  });
  ctx.globalAlpha = 1;
}

// ── SUN / MOON ───────────────────────────────────────────────────────────────
function celestialPos(rise, set, t) {
  const span = set > rise ? set-rise : (1-rise+set);
  let rel;
  if (set > rise) {
    if (t < rise || t > set) return null;
    rel = (t-rise)/span;
  } else {
    if      (t >= rise) rel = (t-rise)/span;
    else if (t <= set)  rel = (1-rise+t)/span;
    else                return null;
  }
  const sh = skyH(), ang = Math.PI*rel;
  return [W*0.5 - Math.cos(ang)*W*0.42, sh - Math.sin(ang)*sh*0.88];
}
function drawSunMoon(t) {
  const sp = celestialPos(0.22, 0.78, t);
  const mp = celestialPos(0.72, 0.28, t);
  if (sp) {
    const g = ctx.createRadialGradient(...sp, 0, ...sp, 55);
    g.addColorStop(0,'rgba(255,230,80,0.35)'); g.addColorStop(1,'rgba(255,230,80,0)');
    ctx.fillStyle = g; ctx.fillRect(sp[0]-55, sp[1]-55, 110, 110);
    disk(...sp, 17, C.SUN);
    ctx.strokeStyle = C.SUN; ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const a = i*Math.PI/4;
      ctx.beginPath();
      ctx.moveTo(sp[0]+Math.cos(a)*22, sp[1]+Math.sin(a)*22);
      ctx.lineTo(sp[0]+Math.cos(a)*32, sp[1]+Math.sin(a)*32);
      ctx.stroke();
    }
  }
  if (mp) {
    disk(...mp, 13, C.MOON);
    disk(mp[0]+5, mp[1]-2, 11, skyColors(t)[0]);
  }
}

// ── BACKGROUND TREES (at horizon line) ───────────────────────────────────────
const BG_TREES = Array.from({length:16}, (_, i) => ({
  x: (i/16 + (i*0.037)%0.06),
  h: 0.5 + Math.random()*0.5,
})).sort((a,b) => a.x - b.x);

function drawTrees(light) {
  const horizon = skyH(), s = H/600;
  BG_TREES.forEach((tr, i) => {
    const tx = tr.x*W, th = 55*tr.h*s, tw = 20*tr.h*s, ty = horizon-th;
    const trunk = light < 0.3 ? '#2a1a08' : C.TREE_TRUNK;
    const top1  = light < 0.3 ? '#0e1e06' : C.TREE_MID;
    const top2  = light < 0.3 ? '#121f08' : C.TREE_LIGHT;
    noisyBox(tx-tw*0.12, ty+th*0.6, tw*0.24, th*0.4, i*13+2, 1.5*s, trunk);
    noisyPoly([[tx,ty],[tx-tw,ty+th*0.72],[tx+tw,ty+th*0.72]], i*13, 3*s, top1);
    noisyPoly([[tx,ty+th*0.28],[tx-tw*0.8,ty+th*0.95],[tx+tw*0.8,ty+th*0.95]], i*13+1, 3*s, top2);
  });
}

// ── GROUND GRASS (scattered across 2-D field) ────────────────────────────────
const GRASS_BLADES = Array.from({length:2500}, () => ({
  nx: Math.random(),
  ny: Math.random(),
  h: 1.0 + Math.random() * 1.5,
  w: 0.5 + Math.random() * 0.5,
}));
function drawGrass(light) {
  const s = H/600, col = light < 0.25 ? C.GRASS_D : C.GRASS_L;
  GRASS_BLADES.forEach((g, i) => {
    const idx = trackIdx(g.nx, g.ny);
    const wear = idx >= 0 ? trackWear[idx] : 0;
    const wornFrac = Math.min(1, wear / TRACK_STRONG);
    const gx = g.nx*W, gy = worldY(g.ny);

    if (wornFrac < 1) {
      // Green blade, fading as wear increases.
      ctx.globalAlpha = 1 - wornFrac;
      const tipX = gx + (srand(i*17, 0) - 0.5) * 2 * 1.2*s;
      poly([[gx-g.w*s, gy],[gx+g.w*s, gy],[tipX, gy-g.h*s]], col);
      ctx.globalAlpha = 1;
    } else {
      // Fully worn: replace with a small seeded earth mark for texture.
      // Use Math.abs() on r-values to keep radii/sizes positive — srand() can return
      // negative values (signed 32-bit hash), and ctx.arc() throws on negative radii.
      const r0 = Math.abs(srand(i*23+1, 7)), r1 = Math.abs(srand(i*23+2, 7)), r2 = srand(i*23+3, 7);
      if (r0 > 0.72) {
        // Small pebble — grey-brown disk.
        const pr  = (0.35 + r1 * 0.45) * s;
        const pcol = dimHex(r1 > 0.5 ? '#8a8070' : '#706050', light);
        disk(gx + (r2-0.5)*2*s, gy - pr*0.5, pr, pcol);
      } else {
        // Compressed-earth smudge — squat trapezoid in varied dirt tones.
        const dc = dimHex(r0 > 0.36 ? '#8a6830' : '#6e5222', light);
        const hw = g.w * (1.0 + r1*0.6) * s;
        const hh = g.h * (0.18 + r2*0.14) * s;
        ctx.save();
        ctx.globalAlpha = 0.35 + r1*0.25;
        poly([[gx-hw, gy],[gx+hw, gy],[gx+hw*0.55, gy-hh],[gx-hw*0.55, gy-hh]], dc);
        ctx.restore();
      }
    }
  });
  ctx.globalAlpha = 1;
}

// ── CLOUDS ────────────────────────────────────────────────────────────────────
const CLOUDS = Array.from({length: 7}, (_, i) => ({
  seed:  i,
  baseNx: srand(i, 90),
  ny:    0.08 + srand(i, 91) * 0.62,   // fraction of sky height from top
  speed: 0.0000018 + srand(i, 92) * 0.0000016,
  scale: 0.7 + srand(i, 93) * 0.9,
}));
function drawClouds(light) {
  if (light < 0.28) return;
  const alpha = Math.min(1, (light - 0.28) / 0.22) * 0.78;
  const sh = skyH();
  ctx.save();
  ctx.fillStyle = '#f6f6f4';
  for (const c of CLOUDS) {
    const nx = (c.baseNx + gameTime * c.speed) % 1.0;
    const cx = nx * W, cy = c.ny * sh;
    const s  = c.scale * W * 0.048;
    // 5 overlapping ellipses for puffy shape — offsets seeded per cloud
    const puffs = [
      [0,                                        0,          s,       s * 0.52],
      [(srand(c.seed, 94) - 0.5) * s * 1.1, -s * 0.30,  s * 0.72, s * 0.44],
      [(srand(c.seed, 95) - 0.5) * s * 1.4, -s * 0.18,  s * 0.66, s * 0.40],
      [ s * 0.70,                             -s * 0.12,  s * 0.58, s * 0.38],
      [-s * 0.72,                             -s * 0.10,  s * 0.60, s * 0.36],
    ];
    ctx.globalAlpha = alpha;
    for (const [ox, oy, rx, ry] of puffs) {
      ctx.beginPath();
      ctx.ellipse(cx + ox, cy + oy, Math.max(1, rx), Math.max(1, ry), 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── TRACKS ────────────────────────────────────────────────────────────────────
// A 80×50 grid covering the ground (nx/ny 0-1). Wear accumulates as villagers
// walk through a cell. High-wear cells become visible dirt tracks; mature
// high-wear cells slowly pave themselves into stone roads.
const TRACK_W         = 80;
const TRACK_H         = 50;
const TRACK_MAX       = 80;    // wear cap
const TRACK_VIS       = 0.5;   // min wear for a dirt track to appear
const TRACK_STRONG    = 20;    // wear for full dirt opacity / paving eligibility
const TRACK_PAVE_RATE = 1 / 480000; // pave 0→1 over 8 real minutes once eligible

let trackWear = new Float32Array(TRACK_W * TRACK_H);
let trackPave = new Float32Array(TRACK_W * TRACK_H);  // 0→1

// Tiny offscreen canvas: each pixel = one grid cell.
// Drawn scaled-up with bilinear interpolation for a smooth, natural look.
const trackCanvas = document.createElement('canvas');
trackCanvas.width  = TRACK_W;
trackCanvas.height = TRACK_H;
const trackCtx = trackCanvas.getContext('2d');

function trackIdx(nx, ny) {
  const tx = Math.floor(nx * TRACK_W);
  const ty = Math.floor(ny * TRACK_H);
  return (tx < 0 || tx >= TRACK_W || ty < 0 || ty >= TRACK_H) ? -1 : ty * TRACK_W + tx;
}

// Weighted-random selection from worn cells — spreads movement across all
// existing paths rather than funnelling everyone to the single busiest spot.
function trackBiasTarget() {
  let totalW = 0;
  const pool = [];
  for (let i = 0; i < 20; i++) {
    const tx = Math.floor(Math.random() * TRACK_W);
    const ty = Math.floor(Math.random() * TRACK_H);
    const w  = trackWear[ty * TRACK_W + tx];
    if (w >= TRACK_VIS) { pool.push({ tx, ty, w }); totalW += w; }
  }
  if (totalW === 0) return null;
  let r = Math.random() * totalW;
  for (const c of pool) {
    r -= c.w;
    if (r <= 0) return { nx: (c.tx + 0.5) / TRACK_W, ny: (c.ty + 0.5) / TRACK_H };
  }
  return null;
}

function updateTracks(dt) {
  // Accumulate wear under every active (non-sleeping, non-dead) villager.
  for (const v of villagers) {
    if (v.state === 'sleep' || v.state === 'dead' || v.state === 'buried' ||
        v.state === 'being_carried' || v.state === 'at_grave') continue;
    const idx = trackIdx(v.nx, v.ny);
    if (idx >= 0) trackWear[idx] = Math.min(TRACK_MAX, trackWear[idx] + dt * 0.001);
  }
  // Pave eligible cells once the village is established.
  const mature = church && church.completion >= 1 &&
    houses.filter(h => h.completion >= 1).length >= 4;
  if (!mature) return;
  for (let i = 0; i < trackWear.length; i++) {
    if (trackWear[i] >= TRACK_STRONG && trackPave[i] < 1)
      trackPave[i] = Math.min(1, trackPave[i] + dt * TRACK_PAVE_RATE);
  }
}

function drawTracks(light) {
  // Write wear/pave into the tiny canvas (1 px per cell).
  // Drawn scaled-up with smoothing → bilinear interpolation gives soft edges.
  const img  = trackCtx.createImageData(TRACK_W, TRACK_H);
  const data = img.data;
  for (let i = 0; i < trackWear.length; i++) {
    const wear = trackWear[i];
    if (wear < TRACK_VIS) continue;
    const t    = Math.min(1, (wear - TRACK_VIS) / (TRACK_STRONG - TRACK_VIS));
    const pave = trackPave[i];
    const b    = i * 4;
    if (pave > 0.01) {
      // Warm limestone / cobblestone: #c0b48a
      data[b]   = 192; data[b+1] = 180; data[b+2] = 138;
      data[b+3] = Math.round(Math.min(1, t * 0.6 + pave * 0.4) * 210);
    } else {
      // Beaten earth: #9a7040
      data[b]   = 154; data[b+1] = 112; data[b+2] = 64;
      data[b+3] = Math.round(t * 70);
    }
  }
  trackCtx.putImageData(img, 0, 0);

  // Scale up to fill the ground area; smoothing gives natural blurred edges.
  const groundY = worldY(0);
  ctx.save();
  ctx.globalAlpha      = Math.min(1, light + 0.15);  // dim at night, full in daylight
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(trackCanvas, 0, groundY, W, H - groundY);
  ctx.restore();
}

// ── DRAW BACKGROUND ──────────────────────────────────────────────────────────
function drawBackground() {
  const t = tod(), light = ambientLight(t);
  const [skyTop, skyBot] = skyColors(t);
  const gndCol  = groundColor(t);
  const horizon = skyH();

  // Sky
  const sg = ctx.createLinearGradient(0, 0, 0, horizon);
  sg.addColorStop(0, skyTop); sg.addColorStop(1, skyBot);
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, horizon);

  drawStars(light);
  drawSunMoon(t);
  drawClouds(light);

  // Ground: slightly dimmed at far edge (top), full colour at bottom
  const gndFar = dimHex(gndCol, 0.82);
  const gg = ctx.createLinearGradient(0, horizon, 0, H);
  gg.addColorStop(0, gndFar);
  gg.addColorStop(1, gndCol);
  ctx.fillStyle = gg; ctx.fillRect(0, horizon, W, H-horizon);

  ctx.fillStyle = 'rgba(0,0,0,0.13)'; ctx.fillRect(0, horizon, W, 4);

  drawTrees(light);
  drawGrass(light);
  drawTracks(light);
}

// ── HOUSE ─────────────────────────────────────────────────────────────────────
let nextId = 1;

class House {
  constructor(nx, ny) {
    this.id = nextId++; this.nx = nx; this.ny = ny;
    this.completion = 0; this.buildMs = 0; this.ageMs = 0;
    // Extensions: each teen who ages to adult in a full house triggers one.
    // Type ('up' = extra floor, 'out' = widen) is seeded per slot so it's stable.
    this.extensions  = 0;     // completed extensions (0–3)
    this.extProgress = 0;     // 0→1 build progress of current extension
    this.extPending  = false; // is an extension actively being built?
    this.animalsGiven = false; // farm animals spawned for this house?
    this.burning     = false;
    this.burnProgress = 0;
  }
  get sy() { return worldY(this.ny); }

  // Stable extension type for slot n, seeded by house id.
  _extType(n) { return srand(this.id, 60 + n) > 0.5 ? 'up' : 'out'; }

  // Current hard capacity (completed extensions only; pending slot reserved by extPending).
  get capacity() { return 2 + this.extensions; }

  // Integer floor count for window/band loops.
  get floors() {
    let f = 1;
    for (let i = 0; i < this.extensions; i++) if (this._extType(i) === 'up') f++;
    // In-progress 'up' extension shows the new floor once it's half done.
    if (this.extPending && this._extType(this.extensions) === 'up' && this.extProgress >= 0.5) f++;
    return f;
  }

  // Fractional width multiplier (grows smoothly while an 'out' extension is built).
  get widthScale() {
    let ws = 1.0;
    for (let i = 0; i < this.extensions; i++) if (this._extType(i) === 'out') ws += 0.30;
    if (this.extPending && this._extType(this.extensions) === 'out') ws += 0.30 * this.extProgress;
    return ws;
  }

  // Fractional floor count for computing building height (smooth growth).
  _buildHeight() {
    let h = 1;
    for (let i = 0; i < this.extensions; i++) if (this._extType(i) === 'up') h++;
    if (this.extPending && this._extType(this.extensions) === 'up') h += this.extProgress;
    return h;
  }

  update(dt) {
    if (this.burning) { this.burnProgress = Math.min(1, this.burnProgress + dt / 45000); return; }
    if (this.completion >= 1) {
      this.ageMs += dt;
      // Extension progress — any resident in 'build' state near the house contributes.
      if (this.extPending) {
        const workers = villagers.filter(v =>
          v.homeId === this.id && v.state === 'build' &&
          Math.hypot(v.nx - this.nx, v.ny - this.ny) < 0.05);
        if (workers.length > 0) {
          this.extProgress = Math.min(1, this.extProgress + dt * workers.length / 40000);
          if (this.extProgress >= 1) {
            this.extensions++;
            this.extProgress = 0;
            this.extPending  = false;
          }
        }
      }
      return;
    }
    const workers = villagers.filter(v =>
      v.homeId === this.id && v.state === 'build' &&
      Math.hypot(v.nx - this.nx, v.ny - this.ny) < 0.05);
    if (workers.length > 0) {
      this.buildMs += dt * workers.length;
      this.completion = Math.min(1, this.buildMs / 55000);
    }
  }

  draw() {
    const t = tod(), light = ambientLight(t);
    const s = H/600, c = this.completion, x = this.nx*W, y = this.sy;
    if (c <= 0) return;
    const ws  = this.widthScale;
    const w   = 58*s * ws;
    const bh  = (36 + this._buildHeight() * 14) * s;  // smooth height during extension
    const rh  = (16 + ws * 12) * s;
    const flH = bh / this.floors;               // height of one storey (integer floors)
    const wall  = dimHex(C.WALL,    light);
    const wallD = dimHex(C.WALL_D,  light);
    const roof  = dimHex(C.ROOF,    light);
    const door  = dimHex(C.DOOR,    light);
    const win   = light < 0.35 ? C.WIN_LIT : dimHex(C.WIN_DAY, light);
    const chim  = dimHex(C.CHIMNEY, light);

    // Walls
    noisyBox(x-w/2, y-bh*Math.min(c*6,1), w, bh*Math.min(c*6,1), this.id*7,   2.5*s, wallD);
    if (c > 0.16) {
      const wh = bh*Math.min((c-0.16)*6,1);
      noisyBox(x-w/2, y-wh, w, wh, this.id*7+1, 2*s, wall);
    }
    // Storey divider bands
    if (c > 0.45 && this.floors > 1) {
      for (let fl = 1; fl < this.floors; fl++)
        box(x-w/2+2*s, y - fl*flH - 2*s, w-4*s, 3*s, wallD);
    }
    // Roof
    if (c > 0.35) {
      const ra = Math.min((c-0.35)*5, 1);
      ctx.globalAlpha = ra;
      noisyPoly([[x,y-bh-rh*ra],[x-w/2-5*s,y-bh],[x+w/2+5*s,y-bh]], this.id*7+2, 2*s, roof);
      ctx.globalAlpha = 1;
    }
    // Door
    if (c > 0.55) box(x-5*s, y-17*s, 10*s, 17*s, door);
    // Windows — one row per storey (fl=0 is topmost)
    if (c > 0.70) {
      for (let fl = 0; fl < this.floors; fl++) {
        const isGround = fl === this.floors - 1;
        // Ground floor: skip windows if too narrow to fit beside the door
        if (isGround && w < 46*s) continue;
        // Narrow multi-storey: also skip ground-floor side windows (door fills the space)
        if (isGround && this.floors > 1 && ws < 1.08) continue;
        const wy = y - bh + 10*s + fl * flH;
        box(x-w/2+7*s, wy, 9*s, 9*s, win);
        box(x+w/2-16*s, wy, 9*s, 9*s, win);
        if (ws > 1.15) box(x-4.5*s, wy, 9*s, 9*s, win);  // centre window on wide houses
      }
    }
    // Chimney
    if (c > 0.88) {
      const cx = x + w * 0.22;
      noisyBox(cx, y-bh-18*s, 8*s, 18*s, this.id*7+3, 1.5*s, chim);
      if (light < 0.45) {
        ctx.globalAlpha = 0.25;
        for (let i = 0; i < 3; i++) disk(cx+4*s, y-bh-23*s-8*s*i, (3+i*2)*s, '#909090');
        ctx.globalAlpha = 1;
      }
    }

    // ── Mature flora (ageMs > 5 min = 300 000 ms) ─────────────────────────────
    if (c < 1 || this.ageMs < 300000) return;
    const fa = Math.min(1, (this.ageMs - 300000) / 60000);
    ctx.globalAlpha = fa;

    const hasRoses = srand(this.id, 52) > 0.38;
    const hasBoxes = srand(this.id, 53) > 0.42;

    if (hasRoses) {
      const vine = dimHex('#2a5010', light);
      const rose = dimHex(srand(this.id, 54) > 0.5 ? '#c02838' : '#d06080', light);
      for (const side of [-1, 1]) {
        const vx = x + side * 5.5*s;
        for (let i = 0; i < 5; i++) {
          box(vx - 0.8*s, y - 2*s - i*3.5*s, 1.6*s, 3.5*s, vine);
          if (srand(this.id, 55 + i + (side > 0 ? 10 : 0)) > 0.45)
            disk(vx + (srand(this.id, 56+i+(side>0?10:0))*4-2)*s, y-3*s-i*3.5*s, 2.2*s, rose);
        }
      }
    }

    if (hasBoxes) {
      const boxWood = dimHex('#4a2808', light);
      const FCOLS = ['#e8d020','#e05070','#ff3030','#f0f0e8','#e070c0','#ff8020'];
      for (let fl = 0; fl < this.floors; fl++) {
        const isGround = fl === this.floors - 1;
        if (isGround && w < 46*s) continue;
        if (isGround && this.floors > 1 && ws < 1.08) continue;
        const wy = y - bh + 10*s + fl * flH;
        const slots = [[x-w/2+6*s, 0], [x+w/2-17*s, 1], ...(ws > 1.15 ? [[x-5.5*s, 2]] : [])];
        for (const [wx, si] of slots) {
          box(wx, wy + 9*s, 11*s, 3*s, boxWood);
          for (let i = 0; i < 4; i++) {
            const fc = dimHex(FCOLS[Math.min(FCOLS.length-1, Math.floor(srand(this.id, 57+fl*30+si*10+i) * FCOLS.length))], light);
            disk(wx + 1.5*s + i*2.5*s, wy + 9*s, 2*s, fc);
          }
        }
      }
    }

    ctx.globalAlpha = 1;

    // Fire overlay when burning
    if (this.burning && this.burnProgress < 1) {
      const fp = this.burnProgress;
      const s = H / 600;
      const cx = this.nx * W, baseY = worldY(this.ny);
      const hw = 31 * this.widthScale * s;
      const flameH = (60 + fp * 80) * s;
      const now = Date.now();
      ctx.globalAlpha = 0.82;
      // 5 flame tongues
      for (let i = 0; i < 5; i++) {
        const fx = cx + (i / 4 - 0.5) * hw * 1.6;
        const wob = Math.sin(now * 0.006 + i * 1.3) * 6 * s;
        const fh  = flameH * (0.6 + 0.4 * Math.sin(now * 0.004 + i * 2.1));
        poly([[fx - 8*s, baseY], [fx + 8*s, baseY], [fx + wob*0.5, baseY - fh*0.6], [fx + wob, baseY - fh]], '#ff6600');
        ctx.globalAlpha = 0.45;
        poly([[fx - 5*s, baseY], [fx + 5*s, baseY], [fx + wob*0.3, baseY - fh*0.4], [fx + wob*0.5, baseY - fh*0.75]], '#ffdd00');
        ctx.globalAlpha = 0.82;
      }
      // Smoke puffs above
      ctx.globalAlpha = 0.35;
      for (let i = 0; i < 3; i++) {
        const sr = (12 + i * 8) * s;
        const sx = cx + Math.sin(now * 0.002 + i * 1.7) * 10 * s;
        const sy = baseY - flameH - i * 18 * s;
        disk(sx, sy, sr, '#332820');
      }
      ctx.globalAlpha = 1;
    }
  }
}

// ── CHURCH ───────────────────────────────────────────────────────────────────
class Church {
  constructor(nx, ny) {
    this.id = nextId++; this.nx = nx; this.ny = ny;
    this.completion = 0; this.buildMs = 0;
    this.ageMs = 0; this.lastBellDay = -1;
  }
  get sy() { return worldY(this.ny); }
  get hasWindows()   { return this.ageMs > 30000;  }
  get hasBell()      { return this.ageMs > 120000; }
  get hasGargoyles() { return this.ageMs > 300000; }

  update(dt) {
    if (this.completion < 1) {
      const workers = villagers.filter(v => v.state === 'build_church');
      this.buildMs += dt * Math.max(workers.length, 0.2);
      this.completion = Math.min(1, this.buildMs / 100000);
      return;
    }
    this.ageMs += dt;
    // Ring bell at start of Sunday service
    const t = tod();
    const isSundayMorning = (dayNum() % 7 === 0) && t > 0.25 && t < 0.27;
    if (this.hasBell && isSundayMorning && this.lastBellDay !== dayNum()) {
      this.lastBellDay = dayNum();
      playChurchBell();
    }
  }

  draw() {
    const t = tod(), light = ambientLight(t);
    const s = H/600, c = this.completion, x = this.nx*W, y = this.sy;
    if (c < 0.04) return;
    const w = 78*s, bh = 68*s, rh = 38*s, tw = 24*s, tth = 86*s;
    const wall  = dimHex(C.CH_WALL, light);
    const roofC = dimHex(C.CH_ROOF, light);
    const door  = dimHex(C.DOOR,    light);
    const cross = dimHex(C.CROSS,   light);

    noisyBox(x-w/2, y-bh*Math.min(c/0.45,1), w, bh*Math.min(c/0.45,1), 999, 3*s, wall);
    if (c > 0.45) {
      const ra = Math.min((c-0.45)*4,1);
      ctx.globalAlpha = ra;
      noisyPoly([[x,y-bh-rh*ra],[x-w/2-6*s,y-bh],[x+w/2+6*s,y-bh]], 1000, 2.5*s, roofC);
      ctx.globalAlpha = 1;
    }
    if (c > 0.55) {
      const ta = Math.min((c-0.55)*5,1), tcx = x-w/2-tw;
      noisyBox(tcx, y-tth*ta, tw, tth*ta, 1001, 2*s, wall);
      if (c > 0.80) {
        const sa = Math.min((c-0.80)*5,1), spH = 36*s*sa, cx2 = tcx+tw/2;
        noisyPoly([[cx2,y-tth-spH],[cx2-tw/2-2*s,y-tth],[cx2+tw/2+2*s,y-tth]], 1002, 2*s, roofC);
      }
    }
    if (c > 0.92) {
      const ca = Math.min((c-0.92)*12,1);
      ctx.globalAlpha = ca;
      const cx2    = x-w/2-tw/2;
      const spTip  = y - tth - 36*s*Math.min((c-0.80)*5,1);
      const cy2    = spTip - 6*s;
      ctx.strokeStyle = cross; ctx.lineWidth = 3*s;
      ctx.beginPath(); ctx.moveTo(cx2, cy2-14*s); ctx.lineTo(cx2, cy2+4*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx2-8*s, cy2-7*s); ctx.lineTo(cx2+8*s, cy2-7*s); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (c > 0.72) {
      const dw = 12*s, dh = 22*s;
      ctx.fillStyle = door;
      ctx.beginPath();
      ctx.rect(x-dw/2, y-dh, dw, dh-dw/2);
      ctx.arc(x, y-dh+dw/2, dw/2, Math.PI, 0);
      ctx.fill();
    }

    // ── Post-completion features ──────────────────────────────────────────────
    if (c < 1) return;
    const winCol  = light < 0.35 ? dimHex(C.WIN_LIT, light) : dimHex(C.WIN_DAY, light);
    const stoneCol = dimHex(C.CH_WALL, light);

    // Windows (unlocked at ageMs > 30 000)
    if (this.hasWindows) {
      const fa = Math.min(1, (this.ageMs - 30000) / 20000);
      ctx.globalAlpha = fa;
      // Rose window on nave front (above door)
      const rwx = x, rwy = y - bh + 20*s, rwr = 10*s;
      disk(rwx, rwy, rwr + 2*s, stoneCol);
      disk(rwx, rwy, rwr, winCol);
      // Rose spokes
      ctx.strokeStyle = stoneCol; ctx.lineWidth = 1.5*s;
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
        ctx.beginPath();
        ctx.moveTo(rwx + Math.cos(a)*3*s, rwy + Math.sin(a)*3*s);
        ctx.lineTo(rwx + Math.cos(a)*rwr,  rwy + Math.sin(a)*rwr);
        ctx.stroke();
      }
      disk(rwx, rwy, 3*s, stoneCol);
      // Lancet side windows on nave
      for (const side of [-1, 1]) {
        const wx = x + side * (w/2 - 9*s), wy = y - bh + 38*s;
        box(wx - 5*s, wy - 16*s, 10*s, 16*s, stoneCol);
        ctx.beginPath();
        ctx.arc(wx, wy - 16*s, 5*s, Math.PI, 0);
        ctx.rect(wx - 5*s, wy - 16*s, 10*s, 16*s);
        ctx.fillStyle = winCol; ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Bell in tower (unlocked at ageMs > 120 000)
    if (this.hasBell) {
      const fa = Math.min(1, (this.ageMs - 120000) / 20000);
      ctx.globalAlpha = fa;
      const tcx = x - w/2 - tw/2;
      const bely = y - tth + 28*s; // bell opening mid-height
      // Two arched openings (front and side illusion)
      for (const side of [-1, 1]) {
        const ox = tcx + side * 4*s;
        ctx.beginPath();
        ctx.arc(ox, bely - 8*s, 5*s, Math.PI, 0);
        ctx.rect(ox - 5*s, bely - 8*s, 10*s, 8*s);
        ctx.fillStyle = dimHex('#1a1008', light); ctx.fill();
      }
      // Bell silhouette
      ctx.fillStyle = dimHex('#604820', light);
      ctx.beginPath();
      ctx.arc(tcx, bely - 5*s, 4.5*s, Math.PI, 0);
      ctx.closePath(); ctx.fill();
      box(tcx - 1*s, bely - 5*s, 2*s, 4*s, dimHex('#302010', light)); // clapper
      ctx.globalAlpha = 1;
    }

    // Gargoyles (unlocked at ageMs > 300 000)
    if (this.hasGargoyles) {
      const fa = Math.min(1, (this.ageMs - 300000) / 20000);
      ctx.globalAlpha = fa;
      const gy = y - bh; // base of roof / top of walls
      const gstone = dimHex('#a89878', light);
      for (const side of [-1, 1]) {
        // Tower is on the left (side=-1); place that gargoyle outside the tower's outer face instead
        const gx = side === 1 ? x + (w/2 + 6*s) : x - w/2 - tw - 4*s;
        // Body crouching on the cornice
        noisyPoly([
          [gx,          gy - 2*s],
          [gx + side*12*s, gy - 4*s],
          [gx + side*16*s, gy - 2*s],
          [gx + side*14*s, gy + 4*s],
          [gx,          gy + 3*s],
        ], 5001 + side, 1.2*s, gstone);
        // Head
        disk(gx + side*17*s, gy - 4*s, 4*s, gstone);
        // Snout
        poly([
          [gx + side*20*s, gy - 4*s],
          [gx + side*20*s, gy - 2*s],
          [gx + side*26*s, gy - 3*s],
        ], gstone);
        // Eye socket
        disk(gx + side*18.5*s, gy - 5.5*s, 1.2*s, dimHex('#201808', light));
        // Wing stub
        noisyPoly([
          [gx + side*2*s,  gy - 6*s],
          [gx + side*10*s, gy - 14*s],
          [gx + side*14*s, gy - 8*s],
          [gx + side*8*s,  gy - 2*s],
        ], 5003 + side, 1.5*s, dimHex('#907858', light));
      }
      ctx.globalAlpha = 1;
    }
  }
}

// ── BUILDING AVOIDANCE ───────────────────────────────────────────────────────
// The door / front face of each building is at its registered ny coordinate.
// The building occupies space BEHIND the door (smaller ny = farther from viewer)
// plus a tiny doorstep buffer in front, so wanderers stop just outside the door.
// Resolution is always in ny only — buildings are "shallow" so the detour is small.
const BLDG_BACK  = 0.044; // depth of building behind its door face (in ny)
const BLDG_FRONT = 0.006; // small doorstep buffer in front of the door face (in ny)
// Convenience: the ny coordinate of a building's doorstep (just in front of the door)
function bldgDoorNy(ny) { return ny + BLDG_FRONT; }

// prevNy = the villager's ny BEFORE this frame's movement, used to determine
// which face of each obstacle zone they entered through so they stop cleanly
// on that face rather than oscillating back and forth across the boundary.
function avoidBldgs(nx, ny, prevNy) {
  const s = H / 600;
  let adjNy = ny;
  // Stop at whichever face the villager entered through.
  // If they were already inside (e.g. first frame after load), push to nearest face.
  function checkRect(cx, halfW, y1, y2) {
    if (nx <= cx - halfW || nx >= cx + halfW) return; // clear in nx
    if (adjNy <= y1 || adjNy >= y2) return;           // already outside
    if      (prevNy >= y2) adjNy = y2;   // entered from front — stop at front face
    else if (prevNy <= y1) adjNy = y1;   // entered from back  — stop at back face
    else adjNy = (adjNy - y1 < y2 - adjNy) ? y1 : y2; // was inside — push to nearest
  }
  function checkBldg(cx, halfW, cy) {
    checkRect(cx, halfW, cy - BLDG_BACK, cy + BLDG_FRONT);
  }
  for (const h of houses) {
    if (h.completion < 0.25) continue;
    checkBldg(h.nx, 31 * h.widthScale * s / W, h.ny);
  }
  if (church    && church.completion    > 0.25) checkBldg(church.nx,    50 * s / W, church.ny);
  if (mausoleum && mausoleum.completion > 0.25) checkBldg(mausoleum.nx, 52 * s / W, mausoleum.ny);
  for (const g of kitchenGardens) {
    if (!g.built) continue;
    checkRect(g.nx, 24 * s / W, g.ny - 0.068, g.ny + 0.008);
  }
  if (pond) checkRect(pond.nx, pond.rx, pond.ny - pond.ry, pond.ny + pond.ry);
  return Math.max(0.02, Math.min(0.98, adjNy));
}

// Returns an intermediate waypoint that routes around the first obstacle blocking
// the straight-line path from (nx,ny) to (tnx,tny), or null if the path is clear.
// The waypoint is placed past the obstacle's FAR face (the one the villager is
// heading toward), so the onward path from the waypoint to the final target is
// also clear — one hop per obstacle is always sufficient.
function pathDetour(nx, ny, tnx, tny) {
  const s = H / 600;
  const MARGIN = 0.018;
  const pathNyMin = Math.min(ny, tny), pathNyMax = Math.max(ny, tny);

  const rects = [];
  for (const h of houses) {
    if (h.completion < 0.25) continue;
    rects.push({ cx: h.nx, halfW: 31 * h.widthScale * s / W,
                 y1: h.ny - BLDG_BACK, y2: h.ny + BLDG_FRONT });
  }
  if (church    && church.completion    > 0.25)
    rects.push({ cx: church.nx,    halfW: 50*s/W,
                 y1: church.ny    - BLDG_BACK, y2: church.ny    + BLDG_FRONT });
  if (mausoleum && mausoleum.completion > 0.25)
    rects.push({ cx: mausoleum.nx, halfW: 52*s/W,
                 y1: mausoleum.ny - BLDG_BACK, y2: mausoleum.ny + BLDG_FRONT });
  if (pond)
    rects.push({ cx: pond.nx, halfW: pond.rx, y1: pond.ny - pond.ry, y2: pond.ny + pond.ry });
  for (const g of kitchenGardens) {
    if (!g.built) continue;
    rects.push({ cx: g.nx, halfW: 24 * s / W, y1: g.ny - 0.068, y2: g.ny + 0.008 });
  }

  for (const r of rects) {
    // Intentional approach: final target is within this obstacle's footprint — skip.
    if (tnx >= r.cx - r.halfW && tnx <= r.cx + r.halfW &&
        tny >= r.y1 - 0.01   && tny <= r.y2 + 0.01) continue;
    // Already inside (avoidBldgs handles that) — skip.
    if (nx >= r.cx - r.halfW && nx <= r.cx + r.halfW &&
        ny >= r.y1            && ny <= r.y2) continue;
    // Obstacle's ny range must straddle some portion of the path's ny span.
    if (r.y1 >= pathNyMax || r.y2 <= pathNyMin) continue;
    // Find the path's nx at the obstacle's depth midpoint.
    const ymid = (Math.max(r.y1, pathNyMin) + Math.min(r.y2, pathNyMax)) * 0.5;
    const t    = tny !== ny ? (ymid - ny) / (tny - ny) : 0.5;
    const xAt  = nx + t * (tnx - nx);
    if (xAt <= r.cx - r.halfW || xAt >= r.cx + r.halfW) continue; // path misses in x

    // Path is blocked. Waypoint at the near face + side offset so the path to the
    // waypoint doesn't cross through the building (far-face caused oscillation with avoidBldgs).
    // Use >= so that villagers pushed exactly to r.y2 by avoidBldgs get the correct branch.
    const wpNy    = ny >= r.y2 ? r.y2 + MARGIN : r.y1 - MARGIN;
    const leftNx  = r.cx - r.halfW - MARGIN;
    const rightNx = r.cx + r.halfW + MARGIN;
    const dLeft   = Math.hypot(leftNx  - nx, wpNy - ny) + Math.hypot(tnx - leftNx,  tny - wpNy);
    const dRight  = Math.hypot(rightNx - nx, wpNy - ny) + Math.hypot(tnx - rightNx, tny - wpNy);
    return { nx: dLeft <= dRight ? leftNx : rightNx, ny: wpNy };
  }
  return null;
}

// ── VILLAGER ─────────────────────────────────────────────────────────────────
const AGE_DURATION = { child: 200000, teen: 260000, adult: 600000 };

class Villager {
  constructor(d = {}) {
    this.id       = d.id       !== undefined ? d.id       : nextId++;
    this.nx       = d.nx       !== undefined ? d.nx       : 0.5;
    this.ny       = d.ny       !== undefined ? d.ny       : 0.5;
    this.gender   = d.gender   || (Math.random() < 0.5 ? 'm' : 'f');
    this.age      = d.age      || 'adult';
    this.homeId   = d.homeId   !== undefined ? d.homeId   : null;
    this.state    = d.state    || 'wander';
    this.stateMs  = d.stateMs  || 0;
    this.ageMs    = d.ageMs    || 0;
    this.childMs  = d.childMs  !== undefined ? d.childMs  : (60000 + Math.random()*90000);
    this.fertility = d.fertility !== undefined ? d.fertility
      : Math.max(1, Math.min(7, Math.round(3 + (Math.random()+Math.random()+Math.random()+Math.random()-2)*1.5)));
    this.tnx      = d.tnx      !== undefined ? d.tnx      : this.nx;
    this.tny      = d.tny      !== undefined ? d.tny      : this.ny;
    this.isPriest = d.isPriest || false;
    this.hairColor  = d.hairColor  || (Math.random() < 0.6 ? C.HAIR_BR : C.HAIR_BL);
    this.skinColor  = d.skinColor  || null;  // null = default C.SKIN; set by wizard
    this.shirtColor = d.shirtColor || null;  // null = default; set by wizard
    this.partnerId     = d.partnerId !== undefined ? d.partnerId : null; // permanent bond
    this.handPartnerId = null;  // id of hand-holding partner, or null
    this.holdHandMs    = 0;     // remaining ms of hand-hold
    this.carryBodyId   = null;  // id of body being carried, or null
    this.moving        = false; // true only when actually displacing this frame
  }

  get sy() { return worldY(this.ny); }

  // Half the building scale (H/1200 vs H/600)
  get scale() {
    const base = H / 1200;
    if (this.age === 'child') return base * 0.5;
    if (this.age === 'teen')  return base * 0.75;
    return base;
  }

  _shirtColor() {
    if (this.shirtColor) return this.shirtColor;
    if (this.isPriest)        return C.ROBE;
    if (this.age === 'child') return C.SHIRT_K;
    return this.gender === 'm' ? C.SHIRT_M : C.SHIRT_F;
  }

  update(dt) {
    this.moving = false; // reset each frame; _moveTo sets true when displacing
    const t       = tod();
    const light   = ambientLight(t);
    const isNight = light < 0.25;
    const isSunday = (dayNum() % 7 === 0) && (t > 0.25 && t < 0.42);

    this.stateMs -= dt;
    if (this.holdHandMs > 0) {
      this.holdHandMs -= dt;
      if (this.holdHandMs <= 0) this._releaseHand();
    }

    // Age progression (child → teen → adult → old)
    if (this.age in AGE_DURATION) {
      this.ageMs += dt;
      if (this.ageMs >= AGE_DURATION[this.age]) {
        this.ageMs = 0;
        if      (this.age === 'child') { this.age = 'teen'; }
        else if (this.age === 'teen')  {
          this.age = 'adult'; playGrow();
          // Grown-up child: extend the house or leave if it's full.
          if (this.homeId !== null) {
            const home = houses.find(h => h.id === this.homeId);
            if (home && home.completion >= 1) {
              const otherAdults = villagers.filter(v =>
                v.homeId === home.id && v.id !== this.id &&
                (v.age === 'adult' || v.age === 'old')).length;
              if (otherAdults >= home.capacity) {
                if (home.extensions < 3 && !home.extPending) {
                  // Trigger extension — new adult goes to build it.
                  home.extPending  = true;
                  home.extProgress = 0;
                  this.state   = 'build';
                  this.stateMs = 15000 + Math.random() * 15000;
                  this.tnx = home.nx; this.tny = home.ny;
                } else {
                  // House is at max capacity or extension already in progress — re-home.
                  this.homeId = null;
                  assignHome(this);
                }
              }
            }
          }
        }
        else if (this.age === 'adult') { this.age = 'old'; }
      }
    }
    // Old-age death — threshold varies per villager via stable sin hash (4–9 min as old)
    if (this.age === 'old' && this.state !== 'dead' &&
        this.state !== 'being_carried' && this.state !== 'at_grave') {
      this.ageMs += dt;
      if (this.ageMs >= 240000 + (Math.sin(this.id * 2.1) + 1) * 150000) this._die();
    }

    // Child production — any cohabiting adult pair (any gender combo); lower-id partner owns the timer
    if (this.age === 'adult' && this.homeId !== null && !this.isPriest && this.fertility > 0) {
      const mate = villagers.find(v =>
        v.homeId === this.homeId && v.id > this.id && v.age === 'adult' && !v.isPriest && v.fertility > 0);
      if (mate) {
        this.childMs -= dt;
        if (this.childMs <= 0) {
          spawnChild(this);
          this.fertility--;
          mate.fertility--;
          this.childMs = 60000 + Math.random() * 120000;
        }
      }
    }

    // Sunday church attendance
    if (isSunday && church && church.completion > 0.6
        && this.state !== 'church' && this.state !== 'sleep' && this.state !== 'flee'
        && this.state !== 'going_home' && this.state !== 'funeral' && this.state !== 'fetch_body'
        && this.state !== 'carry_body' && this.state !== 'dead'
        && this.state !== 'being_carried' && this.state !== 'at_grave' && this.state !== 'mob') {
      this.state = 'church'; this.stateMs = 9999999;
      this.tnx = church.nx;  this.tny = church.ny;
    }

    // Wolf proximity — flee if wolf is nearby
    if (wolf.active && this.state !== 'sleep' && this.state !== 'flee'
        && this.state !== 'dead' && this.state !== 'being_carried' && this.state !== 'at_grave') {
      const wdx = this.nx - wolf.nx, wdy = this.ny - wolf.ny;
      if (Math.hypot(wdx, wdy) < 0.16) {
        const ang = Math.atan2(wdy, wdx);
        this.tnx = Math.max(0.02, Math.min(0.98, this.nx + Math.cos(ang) * 0.40));
        this.tny = Math.max(0.02, Math.min(0.98, this.ny + Math.sin(ang) * 0.40));
        this.state = 'flee'; this.stateMs = 2000 + Math.random() * 2000;
      }
    }

    // Bear proximity — flee if bear is nearby (shorter range: ~1/3 of wolf's)
    if (bear.active && this.state !== 'sleep' && this.state !== 'flee'
        && this.state !== 'dead' && this.state !== 'being_carried' && this.state !== 'at_grave') {
      const bdx = this.nx - bear.nx, bdy = this.ny - bear.ny;
      if (Math.hypot(bdx, bdy) < 0.11) {
        const ang = Math.atan2(bdy, bdx);
        this.tnx = Math.max(0.02, Math.min(0.98, this.nx + Math.cos(ang) * 0.30));
        this.tny = Math.max(0.02, Math.min(0.98, this.ny + Math.sin(ang) * 0.30));
        this.state = 'flee'; this.stateMs = 2000 + Math.random() * 2000;
      }
    }

    // Ghost proximity — flee if ghost is nearby
    if (ghost.active && this.state !== 'sleep' && this.state !== 'flee'
        && this.state !== 'going_home'
        && this.state !== 'dead' && this.state !== 'being_carried' && this.state !== 'at_grave') {
      const ghdx = this.nx - ghost.nx, ghdy = this.ny - ghost.ny;
      if (Math.hypot(ghdx, ghdy) < 0.16) {
        const ang = Math.atan2(ghdy, ghdx);
        this.tnx = Math.max(0.02, Math.min(0.98, this.nx + Math.cos(ang) * 0.40));
        this.tny = Math.max(0.02, Math.min(0.98, this.ny + Math.sin(ang) * 0.40));
        this.state = 'flee'; this.stateMs = 2000 + Math.random() * 2000;
      }
    }

    // Validate hand-hold; break if partner gone or state conflicts
    if (this.handPartnerId !== null) {
      const _p = villagers.find(v => v.id === this.handPartnerId);
      if (!_p || _p.handPartnerId !== this.id ||
          this.state === 'flee' || this.state === 'build' ||
          this.state === 'build_church' || this.state === 'build_mausoleum' ||
          this.state === 'church' || this.state === 'going_home') {
        this._releaseHand();
      }
    }

    // Evening — head home proactively when it gets late (before full dark)
    if (tod() > 0.70 && this.homeId !== null && this.state === 'wander' && this.handPartnerId === null) {
      const _eh = houses.find(h => h.id === this.homeId && h.completion > 0.5);
      if (_eh) { this.state = 'going_home'; this.tnx = _eh.nx; this.tny = bldgDoorNy(_eh.ny); this.stateMs = 99999; }
    }

    switch (this.state) {
      case 'arrive':
        this._moveTo(this.tnx, this.tny, dt, 0.00018, true);
        if (Math.hypot(this.tnx-this.nx, this.tny-this.ny) < 0.012) {
          this.state = 'wander'; this.stateMs = 2000 + Math.random()*4000;
          assignHome(this);
        }
        break;

      case 'wander': {
        let wspeed = this.age === 'old' ? 0.000038 : 0.000055;
        if (this.handPartnerId !== null) {
          const _ldr = villagers.find(v => v.id === this.handPartnerId);
          if (_ldr) {
            if (_ldr.id < this.id) {
              // Follower locks onto leader's current position + lateral offset
              const side = (this.id % 2 === 0) ? 0.022 : -0.022;
              this.tnx = Math.max(0.02, Math.min(0.98, _ldr.nx + side));
              this.tny = _ldr.ny;
            }
            // both partners walk at the pace of the slower one
            wspeed = Math.min(wspeed, _ldr.age === 'old' ? 0.000038 : 0.000055);
          }
        }
        this._moveTo(this.tnx, this.tny, dt, wspeed, true);
        if (Math.hypot(this.tnx-this.nx, this.tny-this.ny) < 0.012 || this.stateMs <= 0) {
          if (isNight && this.homeId !== null) {
            const _wh = houses.find(h => h.id === this.homeId && h.completion > 0.5);
            if (_wh) { this.state = 'going_home'; this.tnx = _wh.nx; this.tny = _wh.ny; this.stateMs = 99999; }
            else { this.state = 'sleep'; }
          } else if (isNight && this.homeId === null) {
            this.state = 'sleep';
          } else { this._pickTarget(); }
        }
        break;
      }

      case 'build': {
        const home = houses.find(h => h.id === this.homeId);
        if (!home || (home.completion >= 1 && !home.extPending) || this.stateMs <= 0) { this._pickTarget(); }
        else { this._moveTo(home.nx, home.ny, dt, 0.000045, true); }
        break;
      }

      case 'build_church':
        if (!church || church.completion >= 1 || this.stateMs <= 0) { this._pickTarget(); }
        else { this._moveTo(church.nx, church.ny, dt, 0.000045, true); }
        break;

      case 'sleep':
        if (!isNight && tod() < 0.70) {
          // Ensure homed villagers emerge from the doorstep, not from inside the building.
          if (this.homeId !== null) {
            const _sh = houses.find(h => h.id === this.homeId);
            if (_sh && _sh.completion >= 0.5) {
              this.nx = _sh.nx; this.ny = bldgDoorNy(_sh.ny);
            }
          }
          // Morning emergence — pair with permanent partner, or form one (65% chance)
          if (this.handPartnerId === null && this.homeId !== null) {
            let partner = this.partnerId !== null
              ? villagers.find(v => v.id === this.partnerId && v.state === 'sleep' && v.handPartnerId === null)
              : null;
            if (!partner && Math.random() < 0.65) {
              partner = villagers.find(v =>
                v.homeId === this.homeId && v.id !== this.id &&
                v.age === 'adult' && v.state === 'sleep' && v.handPartnerId === null && v.partnerId === null);
              if (partner) { this.partnerId = partner.id; partner.partnerId = this.id; }
            }
            if (partner) {
              this.handPartnerId = partner.id; partner.handPartnerId = this.id;
              const dur = 25000 + Math.random() * 35000;
              this.holdHandMs = dur; partner.holdHandMs = dur;
            }
          }
          this._pickTarget();
        }
        break;

      case 'church':
        if (Math.hypot(this.tnx - this.nx, this.tny - this.ny) > 0.07)
          this._moveTo(this.tnx, this.tny, dt, 0.000080, true);
        if (!isSunday) this._pickTarget();
        break;

      case 'flee':
        this._moveTo(this.tnx, this.tny, dt, 0.00026);
        if (this.stateMs <= 0 || (!wolf.active && !bear.active && !ghost.active)) this._pickTarget();
        break;

      case 'going_home': {
        if (this.stateMs <= 0) { this.state = 'sleep'; break; }
        const _gh = houses.find(h => h.id === this.homeId);
        if (!_gh || _gh.completion < 0.5) { this.state = 'sleep'; break; }
        const _doorNy = bldgDoorNy(_gh.ny);
        this._moveTo(_gh.nx, _doorNy, dt, this.age === 'old' ? 0.000042 : 0.000065, true);
        if (Math.hypot(_gh.nx - this.nx, _doorNy - this.ny) < 0.02) {
          this.nx = _gh.nx; this.ny = _doorNy; // snap to doorstep then enter
          this.state = 'sleep';
        }
        break;
      }

      case 'dead':
        break; // lie still; updateDeaths() assigns a carrier

      case 'being_carried':
        break; // position mirrored by carrier each frame

      case 'at_grave':
        if (this.stateMs <= 0) {
          graveyard.totalDead = (graveyard.totalDead || graveyard.crosses.length) + 1;
          graveyard.crosses.push({ nx: this.nx, ny: this.ny });
          this.state = 'buried';
        }
        break;

      case 'buried':
        break; // filtered from villagers[] by updateDeaths()

      case 'funeral':
        this._moveTo(this.tnx, this.tny, dt, 0.000060, false);
        if (this.stateMs <= 0) this._pickTarget();
        break;

      case 'fetch_body': {
        const _b = villagers.find(v => v.id === this.carryBodyId);
        if (!_b || _b.state !== 'dead') { this.carryBodyId = null; this._pickTarget(); break; }
        this._moveTo(_b.nx, _b.ny, dt, 0.000060, false);
        if (Math.hypot(_b.nx - this.nx, _b.ny - this.ny) < 0.025) {
          _b.state = 'being_carried';
          ensureGraveyard();
          this.state = 'carry_body';
          this.tnx = graveyard.nx + (Math.random()-0.5)*0.12;
          this.tny = graveyard.ny + (Math.random()-0.5)*0.08;
        }
        break;
      }

      case 'carry_body': {
        const _b = villagers.find(v => v.id === this.carryBodyId);
        if (!_b || _b.state !== 'being_carried') { this.carryBodyId = null; this._pickTarget(); break; }
        _b.nx = this.nx; _b.ny = this.ny;
        this._moveTo(this.tnx, this.tny, dt, 0.000042, false); // slow — heavy load; skip avoidance so body can be retrieved from near buildings
        if (Math.hypot(this.tnx - this.nx, this.tny - this.ny) < 0.025) depositBody(this, _b);
        break;
      }

      case 'build_garden': {
        const _gg = kitchenGardens.find(g => g.houseId === this.homeId && !g.built);
        if (!_gg || this.stateMs <= 0) { this._pickTarget(); break; }
        this._moveTo(_gg.nx, _gg.ny, dt, 0.000050);
        _gg.buildMs += dt;
        if (_gg.buildMs >= GARDEN_BUILD_MS) { _gg.built = true; this._pickTarget(); }
        break;
      }

      case 'harvest': {
        const _rg = kitchenGardens.find(g => g.houseId === this.homeId && g.hasRipeVeg);
        if (!_rg || this.stateMs <= 0) { this._pickTarget(); break; }
        this._moveTo(_rg.nx, _rg.ny, dt, 0.000060);
        if (Math.hypot(_rg.nx - this.nx, _rg.ny - this.ny) < 0.025) {
          _rg.harvest(); this._pickTarget();
        }
        break;
      }

      case 'emigrate':
        this._moveTo(this.tnx, this.tny, dt, 0.000042); // slow — pushing a loaded cart
        break;

      case 'build_mausoleum':
        if (!mausoleum || mausoleum.completion >= 1 || this.stateMs <= 0) { this._pickTarget(); break; }
        this._moveTo(mausoleum.nx, mausoleum.ny, dt, 0.000045, true);
        break;

      case 'mob': {
        // Walk toward the burning house; ignite it on arrival
        const tgt = houses.find(h => h.id === mobTargetId);
        if (!tgt || tgt.burning || tgt.completion < 0.5) { this.state = 'wander'; break; }
        const door = tgt.nx + (tgt.nx < 0.5 ? -0.01 : 0.01);
        this._moveTo(door, tgt.ny + 0.01, dt, 0.000075, false);
        // Note: stateMs is already decremented at the top of update(); do not decrement again here.
        if (Math.hypot(this.nx - tgt.nx, this.ny - (tgt.ny + 0.01)) < 0.07) {
          tgt.burning = true;
          this.state = 'wander';
        } else if (this.stateMs <= 0) {
          this.state = 'wander';
        }
        break;
      }
    }
  }

  _moveTo(tnx, tny, dt, speed, avoid = true) {
    // Redirect toward a go-around waypoint if the straight line is blocked.
    let gtx = tnx, gty = tny;
    if (avoid) {
      const det = pathDetour(this.nx, this.ny, tnx, tny);
      if (det) { gtx = det.nx; gty = det.ny; }
    }
    const dx = gtx - this.nx, dy = gty - this.ny;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.004) { this.nx = gtx; this.ny = gty; return; }
    const move = Math.min(dist, speed * dt);
    const prevNy = this.ny;
    this.nx += (dx/dist) * move;
    this.ny += (dy/dist) * move;
    if (avoid) this.ny = avoidBldgs(this.nx, this.ny, prevNy);
    this.moving = true;
  }

  _pickTarget() {
    this.carryBodyId = null;
    this.state  = 'wander';
    this.stateMs = 3000 + Math.random()*8000;
    this.tnx    = 0.04 + Math.random()*0.92;
    this.tny    = 0.04 + Math.random()*0.92;
    // 25% chance to head toward a well-worn track instead of a random spot.
    if (Math.random() < 0.25) {
      const tp = trackBiasTarget();
      if (tp) { this.tnx = tp.nx; this.tny = tp.ny; }
    }
    // Nudge wander target out of building footprints to avoid oscillation on arrival.
    { const _s = H / 600;
      const _all = [...houses.map(h => ({ cx: h.nx, hw: 31*h.widthScale*_s/W, y1: h.ny-BLDG_BACK, y2: h.ny+BLDG_FRONT, skip: h.completion < 0.25 })),
                    ...(church && church.completion > 0.25 ? [{ cx: church.nx, hw: 50*_s/W, y1: church.ny-BLDG_BACK, y2: church.ny+BLDG_FRONT, skip: false }] : []),
                    ...kitchenGardens.filter(g => g.built).map(g => ({ cx: g.nx, hw: 24*_s/W, y1: g.ny-0.068, y2: g.ny+0.008, skip: false }))];
      for (const r of _all) {
        if (r.skip) continue;
        if (this.tnx >= r.cx - r.hw - 0.01 && this.tnx <= r.cx + r.hw + 0.01 &&
            this.tny > r.y1 - 0.01 && this.tny < r.y2 + 0.01) {
          this.tny = r.y2 + 0.03;
        }
      }
    }
    if (this.holdHandMs > 0) return;  // don't break away to build while holding hands
    if (this.homeId !== null && this.age !== 'child' && !this.isPriest) {
      const home = houses.find(h => h.id === this.homeId);
      if (home && (home.completion < 1 || home.extPending) && Math.random() < 0.35) {
        this.state = 'build'; this.stateMs = 12000 + Math.random()*18000;
        this.tnx = home.nx;   this.tny = home.ny; return;
      }
    }
    if (mausoleum && mausoleum.completion < 1) {
      if (this.isPriest) {
        this.state = 'build_mausoleum'; this.stateMs = 22000 + Math.random()*22000;
        this.tnx = mausoleum.nx; this.tny = mausoleum.ny; return;
      }
      if (this.age !== 'child' && Math.random() < 0.30) {
        this.state = 'build_mausoleum'; this.stateMs = 12000 + Math.random()*16000;
        this.tnx = mausoleum.nx; this.tny = mausoleum.ny; return;
      }
    }
    if (this.isPriest && church && church.completion < 1 && Math.random() < 0.6) {
      this.state = 'build_church'; this.stateMs = 15000 + Math.random()*20000;
      this.tnx = church.nx; this.tny = church.ny; return;
    }
    if (!this.isPriest && church && church.completion < 1 && this.age === 'adult' && Math.random() < 0.15) {
      this.state = 'build_church'; this.stateMs = 10000 + Math.random()*15000;
      this.tnx = church.nx; this.tny = church.ny;
    }
    // Kitchen garden — build or harvest (adults only, not priest, house complete)
    if (!this.isPriest && this.age !== 'child' && this.homeId !== null && this.holdHandMs <= 0) {
      const home = houses.find(h => h.id === this.homeId);
      if (home && home.completion >= 1) {
        // Build a new garden beside the house (once conditions are met)
        const hasGarden = kitchenGardens.some(g => g.houseId === this.homeId);
        if (!hasGarden && houses.length >= 6 && church && Math.random() < 0.12) {
          const off = home.nx < 0.5 ? 0.09 : -0.09;
          const gx  = Math.max(0.05, Math.min(0.92, home.nx + off));
          const g   = new KitchenGarden(this.homeId, gx, home.ny);
          kitchenGardens.push(g);
          this.state = 'build_garden'; this.stateMs = 18000 + Math.random()*12000;
          this.tnx = g.nx; this.tny = g.ny;
          return;
        }
        // Harvest ripe garden
        const ripe = kitchenGardens.find(g => g.houseId === this.homeId && g.hasRipeVeg);
        if (ripe && Math.random() < 0.40) {
          this.state = 'harvest'; this.stateMs = 8000 + Math.random()*6000;
          this.tnx = ripe.nx; this.tny = ripe.ny;
          return;
        }
      }
    }
    // Re-link with permanent partner when both wandering and close enough (lower id initiates to avoid double-link)
    if (this.state === 'wander' && this.partnerId !== null && this.id < this.partnerId && this.handPartnerId === null) {
      const perm = villagers.find(v => v.id === this.partnerId && v.state === 'wander' && v.handPartnerId === null);
      if (perm && Math.hypot(this.nx - perm.nx, this.ny - perm.ny) < 0.05) {
        this.handPartnerId = perm.id; perm.handPartnerId = this.id;
        const dur = 25000 + Math.random() * 35000;
        this.holdHandMs = dur; perm.holdHandMs = dur;
      }
    }
  }

  _releaseHand() {
    if (this.handPartnerId !== null) {
      const partner = villagers.find(v => v.id === this.handPartnerId);
      if (partner && partner.handPartnerId === this.id) {
        partner.handPartnerId = null; partner.holdHandMs = 0;
      }
    }
    this.handPartnerId = null; this.holdHandMs = 0;
  }

  _die() {
    this._releaseHand();
    if (this.partnerId !== null) {
      const perm = villagers.find(v => v.id === this.partnerId);
      if (perm) perm.partnerId = null;
      this.partnerId = null;
    }
    this.state = 'dead'; this.stateMs = 0;
    if (this.isPriest && !priestSequence) startPriestSequence(this.nx, this.ny);
  }

  draw() {
    const t = tod(), light = ambientLight(t);
    const s   = this.scale;
    const x   = this.nx * W;
    const y   = this.sy;
    const di  = col => dimHex(col, light);
    const shirt = di(this._shirtColor());
    const pants = di(this.isPriest ? C.ROBE : C.PANTS);
    const skin  = di(this.skinColor || C.SKIN);
    const hair  = di(this.age === 'old' ? '#e8e8e0' : (this.isPriest ? C.HAIR_GR : this.hairColor));

    if (this.state === 'dead' || this.state === 'being_carried' || this.state === 'at_grave') {
      const len = 24*s;
      noisyPoly([[x-len/2,y-3*s],[x+len/2,y-3*s],[x+len/2,y+2*s],[x-len/2,y+2*s]],
                this.id*31+5, 1*s, shirt);
      disk(x - len/2 - 5*s, y-1*s, 5*s, skin);
      cap( x - len/2 - 5*s, y-1*s, 5*s, di(this.age === 'old' ? '#e8e8e0' : this.hairColor));
      return;
    }
    if (this.state === 'sleep' && light < 0.25 && this.homeId !== null) return;

    // Homeless outdoor sleeper — visible at night, lying on the ground
    if (this.state === 'sleep' && this.homeId === null) {
      const len = 24 * s;
      // Leather backpack as pillow (drawn first, under head)
      noisyPoly([
        [x - len/2 - 11*s, y - 1*s],
        [x - len/2 -  1*s, y - 1*s],
        [x - len/2 -  1*s, y + 4*s],
        [x - len/2 - 11*s, y + 4*s],
      ], this.id * 31 + 20, 1.2 * s, di('#7a4c28'));
      // Buckle strap across backpack
      box(x - len/2 - 9*s, y + 1*s, 6*s, 1.2*s, di('#5a3210'));
      // Old worn blanket covering body
      noisyPoly([
        [x - len/2 -  1*s, y - 5*s],
        [x + len/2 +  4*s, y - 5*s],
        [x + len/2 +  4*s, y + 3*s],
        [x - len/2 -  1*s, y + 3*s],
      ], this.id * 31 + 21, 2.2 * s, di('#7a7058'));
      // Head resting on backpack (drawn on top)
      disk(x - len/2 - 5*s, y - 1*s, 5*s, skin);
      cap( x - len/2 - 5*s, y - 1*s, 5*s, hair);
      return;
    }

    // Handcart drawn behind emigrating adults (children just walk)
    if (this.state === 'emigrate' && this.age !== 'child' && this.age !== 'teen') {
      const f  = this.tnx > this.nx ? 1 : -1;   // direction of travel
      const cs = H / 1200;                        // cart scale — matches villager scale
      const cx = x + f * 30 * cs;                // cart centre, ahead of villager
      // Wheels
      disk(cx - 9 * cs, y - 6 * cs, 6 * cs, di(C.TREE_TRUNK));
      disk(cx + 9 * cs, y - 6 * cs, 6 * cs, di(C.TREE_TRUNK));
      disk(cx - 9 * cs, y - 6 * cs, 2 * cs, di(C.DOOR));
      disk(cx + 9 * cs, y - 6 * cs, 2 * cs, di(C.DOOR));
      // Wheel spokes (3 per wheel)
      ctx.strokeStyle = di(C.DOOR); ctx.lineWidth = 1 * cs;
      [cx - 9 * cs, cx + 9 * cs].forEach(wx => {
        const wy = y - 6 * cs;
        for (let a = 0; a < Math.PI; a += Math.PI / 3) {
          ctx.beginPath();
          ctx.moveTo(wx + Math.cos(a) * 5.5 * cs, wy + Math.sin(a) * 5.5 * cs);
          ctx.lineTo(wx - Math.cos(a) * 5.5 * cs, wy - Math.sin(a) * 5.5 * cs);
          ctx.stroke();
        }
      });
      // Cart body
      noisyBox(cx - 13 * cs, y - 20 * cs, 26 * cs, 14 * cs, this.id * 13 + 7, 1.5 * cs, di(C.WALL));
      // Belongings pile
      noisyPoly([
        [cx - 11 * cs, y - 20 * cs], [cx + 11 * cs, y - 20 * cs],
        [cx +  7 * cs, y - 27 * cs], [cx -  7 * cs, y - 27 * cs],
      ], this.id * 13 + 8, 2 * cs, di(C.WALL_D));
      // Small box on top
      noisyBox(cx - 4 * cs, y - 27 * cs, 8 * cs, 5 * cs, this.id * 13 + 9, 1 * cs, di(C.WALL));
      // Handles connecting cart to villager
      const hx1 = cx - f * 13 * cs;  // cart end
      const hx2 = x  + f *  6 * cs;  // villager end
      box(Math.min(hx1, hx2), y - 17 * cs, Math.abs(hx1 - hx2), 2 * cs, di(C.CHIMNEY));
      box(Math.min(hx1, hx2), y - 12 * cs, Math.abs(hx1 - hx2), 2 * cs, di(C.CHIMNEY));
    }

    // Walking cycle: legs and arms sway only when actually moving this frame
    const swing = this.moving ? Math.sin(gameTime * 0.0055 + this.id * 2.3) : 0;
    const sway = swing * 5 * s;

    // Legs / skirt
    if (this.gender === 'f' && this.age === 'adult') {
      // Feet peeking from under hem — opposite phase gives alternating step
      const shoe = di(C.DOOR);
      disk(x - 3*s + sway * 0.7, y + 1*s, 2.5*s, shoe);
      disk(x + 3*s - sway * 0.7, y + 1*s, 2.5*s, shoe);
      noisyPoly([[x-6*s,y-8*s],[x+6*s,y-8*s],[x+9*s,y],[x-9*s,y]], this.id*31+1, 0.7*s, di(C.SKIRT));
    } else {
      noisyPoly([[x-6*s,y-8*s],[x-1*s,y-8*s],[x-2*s+sway,y],[x-7*s+sway,y]], this.id*31+1, 0.7*s, pants);
      noisyPoly([[x+1*s,y-8*s],[x+6*s,y-8*s],[x+7*s+sway,y],[x+2*s+sway,y]], this.id*31+2, 0.7*s, pants);
    }
    // Body
    noisyPoly([[x-6*s,y-21*s],[x+6*s,y-21*s],[x+5*s,y-8*s],[x-5*s,y-8*s]], this.id*31, 0.8*s, shirt);
    // Arms
    const ay = y-17*s;
    const building = this.state === 'build' || this.state === 'build_church' || this.state === 'build_garden' || this.state === 'build_mausoleum';
    if (building) {
      const bwave = Math.sin(gameTime * 0.008 + this.id * 2.3) * 7 * s;
      poly([[x-6*s,ay],[x-4*s,ay],[x-12*s,ay-10*s-bwave],[x-14*s,ay-9*s-bwave]], shirt);
      poly([[x+6*s,ay],[x+4*s,ay],[x+12*s,ay-10*s-bwave],[x+14*s,ay-9*s-bwave]], shirt);
    } else {
      poly([[x-6*s,ay],[x-4*s,ay],[x-11*s-sway*0.5,ay+9*s],[x-13*s-sway*0.5,ay+8*s]], shirt);
      poly([[x+6*s,ay],[x+4*s,ay],[x+11*s-sway*0.5,ay+9*s],[x+13*s-sway*0.5,ay+8*s]], shirt);
    }
    // Walking stick for old people
    if (this.age === 'old' && !building) {
      const sx = x + 14*s;
      poly([[sx,y-9*s],[sx+2*s,y-9*s],[sx+4*s,y+1*s],[sx+2*s,y+1*s]], di(C.TREE_TRUNK));
    }
    // Torch for mob villagers
    if (this.state === 'mob') {
      const facing = this.tnx >= this.nx ? 1 : -1;
      const armX = facing > 0 ? x + 11 * s : x - 11 * s;
      const armY = y - 17 * s;
      // Stick
      ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 2 * s;
      ctx.beginPath(); ctx.moveTo(armX, armY); ctx.lineTo(armX, armY - 18 * s); ctx.stroke();
      // Flame
      const now = Date.now();
      ctx.globalAlpha = 0.9;
      poly([[armX - 4*s, armY - 18*s], [armX + 4*s, armY - 18*s], [armX + 2*s, armY - 28*s], [armX, armY - 32*s], [armX - 2*s, armY - 28*s]], '#ff6600');
      ctx.globalAlpha = 0.7;
      poly([[armX - 2*s, armY - 20*s], [armX + 2*s, armY - 20*s], [armX, armY - 30*s]], '#ffdd00');
      ctx.globalAlpha = 1;
    }
    // Head
    disk(x, y-28*s, 7*s, skin);
    cap( x, y-28*s, 7*s, hair);
    if (this.isPriest) box(x-3*s, y-22*s, 6*s, 5*s, di(C.COLLAR));

    // Hand-hold connection — drawn by the leader (lower id) only
    if (this.handPartnerId !== null && this.id < this.handPartnerId) {
      const partner = villagers.find(v => v.id === this.handPartnerId);
      if (partner && Math.hypot(partner.nx - this.nx, partner.ny - this.ny) < 0.07) {
        const ps = partner.scale;
        const px = partner.nx * W, py = partner.sy;
        const myHx = (x < px) ? x  + 11*s  : x  - 11*s;
        const ptHx = (px < x) ? px + 11*ps : px - 11*ps;
        const myHy = y  - 8*s, ptHy = py - 8*ps;
        const r = 1.5 * Math.min(s, ps);
        poly([[myHx, myHy-r],[ptHx, ptHy-r],[ptHx, ptHy+r],[myHx, myHy+r]], skin);
      }
    }
  }
}

// ── BIRD ─────────────────────────────────────────────────────────────────────
class Bird {
  constructor() { this._reset(); }
  _reset() {
    this.nx    = Math.random() < 0.5 ? -0.04 : 1.04;
    this.fy    = 0.04 + Math.random()*0.88;  // fraction of sky height
    this.dnx   = this.nx < 0 ? (0.00006+Math.random()*0.00004) : -(0.00006+Math.random()*0.00004);
    this.flapT = Math.random()*Math.PI*2;
  }
  update(dt) {
    this.nx += this.dnx * dt;
    this.flapT += dt * 0.006;
    if (this.nx < -0.08 || this.nx > 1.08) this._reset();
  }
  draw() {
    const t = tod(), light = ambientLight(t);
    if (light < 0.28) return;
    const x = this.nx*W, y = this.fy*skyH(), s = H/600;
    const flap = Math.sin(this.flapT)*7*s;
    const col = dimHex(C.BIRD, light);
    poly([[x,y],[x-14*s,y+flap],[x-5*s,y+1*s]], col);
    poly([[x,y],[x+14*s,y+flap],[x+5*s,y+1*s]], col);
  }
}

// ── DRAGON ───────────────────────────────────────────────────────────────────
class Dragon {
  constructor() {
    this.active = false; this.nx = -0.18; this.fy = 0.3;
    this.nextAppear = 300000 + Math.random()*500000; this.elapsed = 0;
  }
  update(dt) {
    this.elapsed += dt;
    if (!this.active) {
      if (this.elapsed >= this.nextAppear) {
        this.active = true; this.nx = -0.16;
        this.fy = 0.08 + Math.random()*0.7;
      }
    } else {
      this.nx += 0.000042 * dt;
      if (this.nx > 1.18) {
        this.active = false; this.elapsed = 0;
        this.nextAppear = 300000 + Math.random()*500000;
      }
    }
  }
  draw() {
    if (!this.active) return;
    const t = tod(), light = ambientLight(t);
    const x = this.nx*W, y = this.fy*skyH(), s = H/600*0.55;
    const body = dimHex(C.DRAGON,   light);
    const wing = dimHex(C.DRAGON_W, light);
    noisyPoly([[x,y],[x-22*s,y+5*s],[x-26*s,y],[x-20*s,y-4*s]], 888, 1.5*s, body);
    poly([[x-5*s,y-2*s],[x-6*s,y+3*s],[x+11*s,y-13*s]], wing);
    poly([[x-5*s,y-2*s],[x-6*s,y+3*s],[x+11*s,y+14*s]], wing);
    noisyPoly([[x,y],[x+8*s,y-3*s],[x+13*s,y+2*s],[x+7*s,y+5*s]], 8881, 1.5*s, body);
  }
}

// ── WIZARD BIRKENOR ──────────────────────────────────────────────────────────
const WIZ_SKINS  = ['#d0a8e0','#a8d8b8','#f0d888','#98c8e8','#e8a8a8','#c0e8d8','#d0b8f0'];
const WIZ_SHIRTS = ['#d03890','#3890d0','#d09020','#20b870','#9030c8','#c05018','#18b8b0','#5030d8'];

class Wizard {
  constructor() {
    this.active = false; this.nx = -0.06; this.ny = 0.5; this.dnx = 0;
    this.elapsed = 0; this.nextAppear = 180000 + Math.random()*300000;
    this.changesLeft = 0;
  }
  get sy() { return worldY(this.ny); }

  update(dt) {
    this.elapsed += dt;
    if (!this.active) {
      if (this.elapsed >= this.nextAppear) {
        this.active = true;
        this.changesLeft = 3;
        const fromLeft = Math.random() < 0.5;
        this.nx  = fromLeft ? -0.06 : 1.06;
        this.dnx = fromLeft ? 0.000060 : -0.000060;
        this.ny  = 0.10 + Math.random()*0.80;
      }
    } else {
      this.nx += this.dnx * dt;
      // Randomly enchant nearby villagers (max 3 per appearance)
      if (this.changesLeft > 0) {
        for (const v of villagers) {
          if (this.changesLeft <= 0) break;
          if (Math.hypot(v.nx - this.nx, v.ny - this.ny) > 0.12) continue;
          if (Math.random() > 0.000025 * dt) continue;
          v.skinColor  = WIZ_SKINS [Math.floor(Math.random() * WIZ_SKINS.length)];
          v.shirtColor = WIZ_SHIRTS[Math.floor(Math.random() * WIZ_SHIRTS.length)];
          this.changesLeft--;
        }
      }
      if (this.nx < -0.12 || this.nx > 1.12) {
        this.active = false; this.elapsed = 0;
        this.nextAppear = 180000 + Math.random()*300000;
      }
    }
  }

  draw() {
    if (!this.active) return;
    const t = tod(), light = ambientLight(t);
    const s = H / 1200;
    const x = this.nx * W, y = this.sy;
    const di = col => dimHex(col, light);
    const night = light < 0.5;

    // Robe (lower)
    noisyPoly([[x-8*s,y],[x+8*s,y],[x+6*s,y-8*s],[x-6*s,y-8*s]], 777, 1.5*s, di(C.WIZ_ROBE));
    // Body
    noisyPoly([[x-6*s,y-8*s],[x+6*s,y-8*s],[x+5*s,y-22*s],[x-5*s,y-22*s]], 7771, 1.5*s, di(C.WIZ_ROBE));
    // Staff hand — right arm slightly raised
    poly([[x+5*s,y-18*s],[x+7*s,y-19*s],[x+15*s,y-44*s],[x+13*s,y-43*s]], di(C.WIZ_STAFF));
    // Staff orb glow at night
    const orbX = x+14*s, orbY = y-45*s;
    if (night) {
      const g = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, 14*s);
      g.addColorStop(0, 'rgba(128,200,255,0.50)'); g.addColorStop(1, 'rgba(80,140,255,0)');
      ctx.fillStyle = g; ctx.fillRect(orbX-14*s, orbY-14*s, 28*s, 28*s);
    }
    disk(orbX, orbY, 3.5*s, night ? '#b0e0ff' : di(C.WIZ_ORB));
    // Left arm down
    poly([[x-5*s,y-18*s],[x-7*s,y-18*s],[x-12*s,y-8*s],[x-10*s,y-8*s]], di(C.WIZ_ROBE));
    // Head
    disk(x, y-29*s, 7*s, di(C.SKIN));
    // Beard
    noisyPoly([[x-5*s,y-25*s],[x+5*s,y-25*s],[x+4*s,y-13*s],[x-4*s,y-13*s]], 779, 1*s, di(C.WIZ_BEARD));
    // Hat brim
    box(x-11*s, y-35*s, 22*s, 3.5*s, di(C.WIZ_HAT));
    // Hat cone
    noisyPoly([[x,y-61*s],[x-8*s,y-35*s],[x+8*s,y-35*s]], 778, 1.5*s, di(C.WIZ_HATD));
    // Moon symbol on hat
    const sy2 = y-49*s;
    ctx.strokeStyle = night ? '#e0c800' : di('#b89040'); ctx.lineWidth = 1.2*s;
    ctx.beginPath(); ctx.arc(x, sy2, 4*s, 0.3, Math.PI*2-0.3); ctx.stroke();
  }
}

// ── WOLF ─────────────────────────────────────────────────────────────────────
class Wolf {
  constructor() {
    this.active = false;
    this.nx = 0.5; this.ny = 0.5;
    this.tnx = 0.5; this.tny = 0.5;
    this.stateMs = 0; this.soundMs = 0;
    this.facing = 1; // 1 = right, -1 = left
    this.nightRolled = false; // whether we've rolled for this night yet
  }
  get sy() { return worldY(this.ny); }
  _isNight(t) { return t > 0.68 || t < 0.18; }

  update(dt) {
    const t = tod(), night = this._isNight(t);
    if (!this.active) {
      if (!night) { this.nightRolled = false; return; }
      if (!this.nightRolled) {
        this.nightRolled = true;
        if (Math.random() < 0.8) return; // ~1 night in 5
        const left = Math.random() < 0.5;
        this.nx = left ? -0.05 : 1.05;
        this.ny = 0.15 + Math.random() * 0.7;
        this.facing = left ? 1 : -1;
        this._pickTarget();
        this.active = true;
        this.soundMs = 2000 + Math.random() * 3000;
      }
      return;
    }
    if (!night) {
      // leave toward nearest edge at dawn
      const tx = this.nx < 0.5 ? -0.1 : 1.1;
      const dx = tx - this.nx;
      const move = Math.min(Math.abs(dx), 0.00014 * dt);
      this.nx += (dx > 0 ? 1 : -1) * move;
      if (this.nx < -0.08 || this.nx > 1.08) this.active = false;
      return;
    }
    this.stateMs -= dt;
    if (this.stateMs <= 0) this._pickTarget();
    const dx = this.tnx - this.nx, dy = this.tny - this.ny;
    const dist = Math.hypot(dx, dy);
    if (dist > 0.006) {
      const move = Math.min(dist, 0.000095 * dt);
      this.nx += (dx / dist) * move;
      this.ny += (dy / dist) * move;
      if (Math.abs(dx) > 0.002) this.facing = dx > 0 ? 1 : -1;
    }
    this.soundMs -= dt;
    if (this.soundMs <= 0) { playWolfGuitar(); this.soundMs = 7000 + Math.random() * 9000; }
  }

  _pickTarget() {
    this.tnx = 0.05 + Math.random() * 0.9;
    this.tny = 0.1  + Math.random() * 0.8;
    this.stateMs = 4000 + Math.random() * 7000;
  }

  draw() {
    if (!this.active) return;
    const t = tod(), light = ambientLight(t);
    const s = H / 600 * 0.60;
    const x = this.nx * W, y = this.sy;
    const body = dimHex('#4a4038', light);
    const dark = dimHex('#222018', light);
    ctx.save();
    ctx.translate(x, 0); ctx.scale(this.facing, 1); ctx.translate(-x, 0);
    // Body
    noisyPoly([[x-20*s,y-4*s],[x+12*s,y-6*s],[x+12*s,y+2*s],[x-20*s,y+2*s]], 6661, 1.2*s, body);
    // Head/neck
    noisyPoly([[x+10*s,y-10*s],[x+20*s,y-8*s],[x+22*s,y],[x+10*s,y]], 6662, 0.8*s, body);
    // Snout
    poly([[x+19*s,y-5*s],[x+26*s,y-3*s],[x+25*s,y+1*s],[x+19*s,y+1*s]], dark);
    // Ear
    poly([[x+13*s,y-10*s],[x+16*s,y-18*s],[x+20*s,y-10*s]], dark);
    // Tail (raised behind rump)
    noisyPoly([[x-20*s,y-4*s],[x-28*s,y-16*s],[x-25*s,y-18*s],[x-17*s,y-6*s]], 6663, 1.5*s, body);
    // Legs (4 thin boxes)
    box(x-14*s, y+2*s, 3.5*s, 8*s, dark);
    box(x-6*s,  y+2*s, 3.5*s, 8*s, dark);
    box(x+2*s,  y+2*s, 3.5*s, 8*s, dark);
    box(x+8*s,  y+2*s, 3.5*s, 7*s, dark);
    // Amber eye
    disk(x+19*s, y-6*s, 1.5*s, '#d4b820');
    ctx.restore();
  }
}

// ── GROUND BIRDS ─────────────────────────────────────────────────────────────
class GroundBird {
  constructor(seed) {
    this.seed = seed;
    this.nx = 0.08 + srand(seed, 0) * 0.84;
    this.ny = 0.62 + srand(seed, 1) * 0.34;
    this.tnx = this.nx; this.tny = this.ny;
    this.startNx = this.nx; this.startNy = this.ny;
    this.state = 'perch'; this.stateMs = 1000 + srand(seed, 2) * 6000;
    this.hopProgress = 0; this.facing = 1; this.animT = srand(seed, 3) * 6;
  }
  get sy() { return worldY(this.ny); }
  update(dt) {
    if (ambientLight(tod()) < 0.28) return;
    this.animT += dt * 0.007;
    this.stateMs -= dt;
    if (this.state === 'perch') {
      if (this.stateMs <= 0) {
        const fly = Math.random() < 0.18;
        const range = fly ? 0.26 : 0.09;
        this.tnx = Math.max(0.02, Math.min(0.98, this.nx + (Math.random()-0.5)*range));
        this.tny = Math.max(0.58, Math.min(0.98, this.ny + (Math.random()-0.5)*range*0.35));
        this.startNx = this.nx; this.startNy = this.ny;
        this.hopProgress = 0; this.state = fly ? 'fly' : 'hop';
        this.stateMs = fly ? 650 : 260;
        if (Math.abs(this.tnx - this.nx) > 0.002)
          this.facing = this.tnx > this.nx ? 1 : -1;
      }
    } else {
      const dur = this.state === 'fly' ? 650 : 260;
      this.hopProgress = Math.min(1, this.hopProgress + dt / dur);
      this.nx = lerp(this.startNx, this.tnx, this.hopProgress);
      this.ny = lerp(this.startNy, this.tny, this.hopProgress);
      if (this.hopProgress >= 1) { this.state = 'perch'; this.stateMs = 1200 + Math.random()*5000; }
    }
  }
  draw() {
    const t = tod(), light = ambientLight(t);
    if (light < 0.28) return;
    const s = H / 600 * 0.40;
    const x = this.nx * W, y = this.sy;
    const di = col => dimHex(col, light);
    const arcH = this.state === 'fly' ? 20 : (this.state === 'hop' ? 8 : 0);
    const bounce = -Math.sin(this.hopProgress * Math.PI) * arcH * s;
    const bob = this.state === 'perch' ? Math.sin(this.animT * 1.4) * 1.3 * s : 0;
    ctx.save();
    ctx.translate(x, 0); ctx.scale(this.facing, 1); ctx.translate(-x, 0);
    const bx = x, by = y + bounce + bob;
    // Body
    ctx.beginPath(); ctx.ellipse(bx, by-3*s, 6*s, 4*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#3a62c0'); ctx.fill();
    // Yellow belly
    ctx.beginPath(); ctx.ellipse(bx+0.5*s, by-2.2*s, 4*s, 2.6*s, 0, 0, Math.PI*2);
    ctx.fillStyle = di('#d4b020'); ctx.fill();
    // Wing bar
    box(bx-5*s, by-4.8*s, 8*s, 1.6*s, di('#8ab0e8'));
    // Tail fan
    poly([[bx-6*s,by-3*s],[bx-11*s,by-5*s],[bx-11*s,by-1.5*s]], di('#1e3a80'));
    // Head
    disk(bx+6*s, by-7.5*s, 3.5*s, di('#3a62c0'));
    // Beak
    poly([[bx+9*s,by-8*s],[bx+14*s,by-7*s],[bx+9*s,by-6.5*s]], di('#d4b020'));
    // Eye
    disk(bx+7.5*s, by-9*s, 1.1*s, '#080808');
    disk(bx+7.8*s, by-9.3*s, 0.45*s, '#ffffff');
    // Legs
    box(bx+1*s, by-0.5*s, 1.6*s, 4*s, di('#c09020'));
    box(bx+4*s, by-0.5*s, 1.6*s, 4*s, di('#c09020'));
    ctx.restore();
  }
}

// ── RABBIT ───────────────────────────────────────────────────────────────────
class Rabbit {
  constructor(seed) {
    this.seed = seed;
    this.nx = 0.06 + srand(seed, 20) * 0.88;
    this.ny = 0.55 + srand(seed, 21) * 0.42;
    this.tnx = this.nx; this.tny = this.ny;
    this.startNx = this.nx; this.startNy = this.ny;
